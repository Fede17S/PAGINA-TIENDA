<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #0a1628; }
    /* Evita el auto-zoom de iOS al enfocar campos (necesita >=16px) */
    input, textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 99px; }

    @keyframes cartBump { 0%{transform:scale(1)} 35%{transform:scale(1.5)} 70%{transform:scale(.85)} 100%{transform:scale(1)} }
    .cart-bump { animation: cartBump .45s ease; }

    @keyframes flyUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-34px) scale(1.4);opacity:0} }
    .fly-up { animation: flyUp .7s ease forwards; }

    @keyframes stepIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
    .step-in { animation: stepIn .28s ease; }

    @keyframes ringPulse { 0%{transform:scale(.4);opacity:.55} 80%{opacity:0} 100%{transform:scale(2.6);opacity:0} }
    .ring-pulse { animation: ringPulse 1.1s ease-out forwards; }

    @keyframes checkPop { 0%{transform:scale(0) rotate(-25deg)} 55%{transform:scale(1.25) rotate(6deg)} 100%{transform:scale(1) rotate(0)} }
    .check-pop { animation: checkPop .6s cubic-bezier(.18,.9,.32,1.3) forwards; }

    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    .draw-check { stroke-dasharray: 40; stroke-dashoffset: 40; animation: drawCheck .5s .28s ease forwards; }

    @keyframes titlePop { 0%{opacity:0;transform:translateY(12px) scale(.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }
    .title-pop { animation: titlePop .5s .35s ease both; }

    @keyframes confFall { 0%{transform:translateY(-12vh) rotate(0);opacity:1} 100%{transform:translateY(86vh) rotate(720deg);opacity:0} }
    .conf { position:absolute; top:0; width:10px; height:14px; border-radius:2px; animation: confFall linear forwards; }

    @keyframes splashIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .splash-in { animation: splashIn .5s cubic-bezier(.18,.9,.32,1.2) both; }
    @keyframes softFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .soft-float { animation: softFloat 2.4s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { border-radius:50%; border:3px solid #1e3a5f; border-top-color:#c9933a; animation: spin .8s linear infinite; }
    @keyframes barGrow { 0%{width:8%} 50%{width:70%} 100%{width:96%} }
    .bar-grow { animation: barGrow 1.4s ease-in-out infinite alternate; }
  </style>
</head>

    /* ============================================================

    const SB_URL = "https://vhoswhyixqtomgqudigj.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3N3aHlpeHF0b21ncXVkaWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTI4ODIsImV4cCI6MjA5NTM4ODg4Mn0.gjUaVJ1RvF3KrjfXVyh8wYIso4QW6RtIfFRbkd0PyA8";
    const SB_HDR = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY };

    async function sbGet(table, params) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: SB_HDR });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    async function sbUpsert(table, row, onConflict) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
        method: "POST",
        headers: { ...SB_HDR, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(row),
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    async function resolverEmpresa(codigo) {
      const emps = await sbGet("empresas", `select=id,codigo,nombre,logo,color,appname&codigo=eq.${encodeURIComponent(codigo)}`);
      return emps && emps[0] ? emps[0] : null;
    }
    async function fetchConfig(empId) {
      const rows = await sbGet("tienda_config", `select=config&empresa_id=eq.${empId}`);
      return rows && rows[0] ? rows[0].config : null;
    }
    async function guardarConfig(empId, config) {
      return sbUpsert("tienda_config", { empresa_id: empId, config, updated_at: new Date().toISOString() }, "empresa_id");
    }
    async function validarAdmin(empId, uid, pass) {
      const rows = await sbGet("usuarios",
        `select=uid,pass,role,name&empresa_id=eq.${empId}&role=eq.admin&uid=eq.${encodeURIComponent(uid)}`);
      return (rows && rows[0] && rows[0].pass === pass) ? rows[0] : null;
    }

    function precioEfectivo(p, listaKey) {
      if (p.preciosJson && p.preciosJson[listaKey] > 0) return p.preciosJson[listaKey];
      const lk = (listaKey || "").toLowerCase();
      if (lk.includes("patagon")) return p.precioPatagonia || p.precioClientes || p.precioBase || 0;
      if (lk.includes("cliente")) return p.precioClientes || p.precioBase || 0;
      return p.precioClientes || p.precioBase || 0;
    }
    function mapProducto(p) {
      const promo = (p.precio_promo && p.precio_promo > 0) ? { precio: p.precio_promo, cant: p.cant_promo || 0 } : null;
      return {
        id: p.id, codigo: p.codigo || "", nombre: p.nombre || "Sin nombre",
        cat: p.categoria || "Sin categoría", foto: p.foto || "", promo,
        precioClientes: p.precio_clientes || 0,
        precioPatagonia: p.precio_patagonia || 0,
        precioBase: p.precio_base || 0,
        preciosJson: p.precios || {},
        unidadVenta: p.unidad_venta || "unidad",
        unidadesBulto: p.unidades_bulto || 1,
        minCompra: p.min_compra || 1,
        cantDefault: p.cant_default || 1,
      };
    }
    async function fetchListas(empId) {
      try {
        const rows = await sbGet("listas_precios", `select=lista_key,nombre,orden&empresa_id=eq.${empId}&order=orden.asc`);
        return (rows || []).map((l) => ({ key: l.lista_key, nombre: l.nombre || l.lista_key }));
      } catch (e) { return []; }
    }
    async function fetchProductos(empId) {
      const COLS = "id,codigo,nombre,categoria,precio_base,precio_clientes,precio_patagonia,precios,foto,precio_promo,cant_promo";
      const COLS_NEW = COLS + ",unidad_venta,unidades_bulto,min_compra,cant_default";
      let rows;
      try { rows = await sbGet("productos", `select=${COLS_NEW}&empresa_id=eq.${empId}&order=nombre.asc`); }
      catch (e) { rows = await sbGet("productos", `select=${COLS}&empresa_id=eq.${empId}&order=nombre.asc`); }
      return (rows || []).map(mapProducto);
    }

    // Mezcla la config guardada con los defaults (por si faltan claves)
    function mergeCfg(saved) {
      if (!saved) return { ...CFG_DEFAULT };
      return {
        ...CFG_DEFAULT, ...saved,
        beneficios: Array.isArray(saved.beneficios) ? saved.beneficios : CFG_DEFAULT.beneficios,
        banners: Array.isArray(saved.banners) ? saved.banners : CFG_DEFAULT.banners,
        ordenCategorias: Array.isArray(saved.ordenCategorias) ? saved.ordenCategorias : [],
        listaPrecio: typeof saved.listaPrecio === "string" ? saved.listaPrecio : "",
      };
    }

    const emojiCat = (nombre) => {
      const n = (nombre || "").toLowerCase();
      if (/bebida|gaseosa|agua|cerveza|vino|jugo/.test(n)) return "🥤";
      if (/limpie|deterg|lavand/.test(n)) return "🧼";
      if (/lacteo|leche|queso|yogur/.test(n)) return "🧀";
      if (/snack|galleti|papa|golosi|chocolate/.test(n)) return "🍪";
      if (/almac|fideo|arroz|aceite|yerba|azuc|harina|conserva/.test(n)) return "🥫";
      if (/bazar|hogar|vaso|cocina/.test(n)) return "🍽️";
      if (/pila|electr/.test(n)) return "🔋";
      if (/perfu|higien|cosme/.test(n)) return "🧴";
      return "📦";
    };
    const fmt = (n) => "$" + Math.round(n || 0).toLocaleString("es-AR", { minimumFractionDigits: 0 });

    /* ============================================================

    // Iconos disponibles para los beneficios
    const ICONOS = { truck: Truck, shield: ShieldCheck, clock: Clock, tag: Tag, store: Store, star: Star, percent: Percent, card: CreditCard, pin: MapPin, phone: Phone, gift: Gift };
    const ICONO_KEYS = Object.keys(ICONOS);

    // Globito que vuela de la card al carrito (arco con dos capas: X y Y por separado)
    function Flyer({ f, onDone }) {
      const [moved, setMoved] = useState(false);
      useEffect(() => {
        const r = requestAnimationFrame(() => requestAnimationFrame(() => setMoved(true)));
        const t = setTimeout(onDone, 720);
        return () => { cancelAnimationFrame(r); clearTimeout(t); };
      }, []);
      return (
        <div style={{ position: "fixed", left: 0, top: 0, zIndex: 80, pointerEvents: "none",
          transform: `translateX(${moved ? f.endX : f.startX}px)`,
          transition: "transform .72s cubic-bezier(.35,0,.7,1)" }}>
          <div style={{
            transform: `translateY(${moved ? f.endY : f.startY}px) translate(-50%,-50%) scale(${moved ? 0.22 : 1}) rotate(${moved ? 220 : 0}deg)`,
            transition: "transform .72s cubic-bezier(.5,-0.55,.75,.9), opacity .72s ease",
            opacity: moved ? 0.25 : 1 }}>
            <div style={{ width: 50, height: 50, borderRadius: 14, overflow: "hidden",
              display: "flex", alignItems: "center", justifyContent: "center",
              background: "#0f1f38", border: "2px solid #c9933a", boxShadow: "0 10px 30px #00000088" }}>
              {f.foto ? <img src={f.foto} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }} /> : <span style={{ fontSize: 26 }}>{f.emoji}</span>}
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       COMPONENTE PRINCIPAL
       ============================================================ */
    function Tienda() {
      const [empresa, setEmpresa] = useState(null);
      const [productosRaw, setProductosRaw] = useState([]);
      const [listas, setListas] = useState([]);
      const [cargando, setCargando] = useState(true);
      const [aviso, setAviso] = useState("");
      const [cfg, setCfg] = useState(CFG_DEFAULT);

      // Lista de precios activa y precios derivados según esa lista
      const listaActiva = useMemo(() => {
        const keys = listas.map((l) => l.key);
        if (cfg.listaPrecio && keys.includes(cfg.listaPrecio)) return cfg.listaPrecio;
        return keys[0] || "clientes";
      }, [cfg.listaPrecio, listas]);
      const productos = useMemo(
        () => productosRaw.map((p) => ({ ...p, precio: precioEfectivo(p, listaActiva) })),
        [productosRaw, listaActiva]
      );

      const [cat, setCat] = useState("todos");
      const [busqueda, setBusqueda] = useState("");
      const [buscFocus, setBuscFocus] = useState(false);
      const [orden, setOrden] = useState("relevancia");
      const [soloOfertas, setSoloOfertas] = useState(false);
      const [carrito, setCarrito] = useState({});
      const [modos, setModos] = useState({});   // { [id]: "unidad" | "caja" }
      const [carritoAbierto, setCarritoAbierto] = useState(false);
      const [paso, setPaso] = useState("carrito");   // carrito | revisar | exito
      const [cliNom, setCliNom] = useState("");
      const [cliTel, setCliTel] = useState("");
      const [cliDir, setCliDir] = useState("");
      const [enviando, setEnviando] = useState(false);
      const [bump, setBump] = useState(0);            // dispara la animación del carrito
      const [splashVisible, setSplashVisible] = useState(true);
      const [splashFade, setSplashFade] = useState(false);
      const [showTop, setShowTop] = useState(false);
      const [errorEnvio, setErrorEnvio] = useState("");
      const [detalle, setDetalle] = useState(null);
      const [flyers, setFlyers] = useState([]);
      const cartRef = useRef(null);
      const [limite, setLimite] = useState(12);
      const sentinelRef = useRef(null);
      const restoredRef = useRef(false);
      const catBarRef = useRef(null);
      const [slide, setSlide] = useState(0);

      // Admin
      const [loginOpen, setLoginOpen] = useState(false);
      const [adminOk, setAdminOk] = useState(false);
      const [editorOpen, setEditorOpen] = useState(false);
      const [loginUid, setLoginUid] = useState("");
      const [loginPass, setLoginPass] = useState("");
      const [loginErr, setLoginErr] = useState("");
      const [loginCargando, setLoginCargando] = useState(false);
      const [editCfg, setEditCfg] = useState(CFG_DEFAULT);
      const [guardando, setGuardando] = useState(false);

      useEffect(() => {
        (async () => {
          try {
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get("emp") || EMP_CODIGO_DEFAULT;
            if (!codigo) { setAviso("Falta el código de empresa. Abrí con ?emp=TUCODIGO en la URL."); setCargando(false); return; }
            const emp = await resolverEmpresa(codigo);
            if (!emp) { setAviso(`No se encontró la empresa con código "${codigo}".`); setCargando(false); return; }
            setEmpresa(emp);
            const [prods, savedCfg, lists] = await Promise.all([
              fetchProductos(emp.id),
              fetchConfig(emp.id).catch(() => null),
              fetchListas(emp.id).catch(() => []),
            ]);
            setProductosRaw(prods);
            setListas(lists);
            setCfg(mergeCfg(savedCfg));
            if (!prods.length) setAviso("La empresa no tiene productos cargados todavía.");
          } catch (e) {
            console.error("Supabase:", e.message);
            setAviso("Error al conectar con la base: " + e.message);
          } finally { setCargando(false); }
        })();
      }, []);

      // Restaurar carrito guardado al resolver la empresa
      useEffect(() => {
        if (!empresa || restoredRef.current) return;
        restoredRef.current = true;
        try {
          const raw = localStorage.getItem("tienda_cart_" + empresa.codigo);
          if (raw) {
            const d = JSON.parse(raw);
            if (d.carrito && typeof d.carrito === "object") setCarrito(d.carrito);
            if (d.modos && typeof d.modos === "object") setModos(d.modos);
            if (d.cliNom) setCliNom(d.cliNom);
            if (d.cliTel) setCliTel(d.cliTel);
            if (d.cliDir) setCliDir(d.cliDir);
          }
        } catch (e) { /* localStorage no disponible (modo privado) */ }
      }, [empresa]);

      // Guardar carrito + datos del cliente ante cualquier cambio
      useEffect(() => {
        if (!empresa || !restoredRef.current) return;
        try {
          localStorage.setItem("tienda_cart_" + empresa.codigo, JSON.stringify({ carrito, modos, cliNom, cliTel, cliDir }));
        } catch (e) { /* sin persistencia */ }
      }, [carrito, modos, cliNom, cliTel, cliDir, empresa]);

      // Mostrar botón "volver arriba" al scrollear
      useEffect(() => {
        const onScroll = () => setShowTop(window.scrollY > 600);
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // Bloquear scroll del fondo cuando hay un panel abierto (evita que se mueva todo en iOS)
      useEffect(() => {
        const abierto = carritoAbierto || !!detalle || loginOpen || editorOpen;
        if (!abierto) return;
        const scrollY = window.scrollY;
        const b = document.body;
        b.style.position = "fixed";
        b.style.top = `-${scrollY}px`;
        b.style.left = "0";
        b.style.right = "0";
        b.style.width = "100%";
        return () => {
          b.style.position = "";
          b.style.top = "";
          b.style.left = "";
          b.style.right = "";
          b.style.width = "";
          window.scrollTo(0, scrollY);
        };
      }, [carritoAbierto, detalle, loginOpen, editorOpen]);
      const scrollArriba = () => window.scrollTo({ top: 0, behavior: "smooth" });
      const irACategoria = (c) => {
        setCat(c);
        setTimeout(() => {
          if (catBarRef.current) window.scrollTo({ top: Math.max(0, catBarRef.current.offsetTop - 70), behavior: "smooth" });
        }, 60);
      };
      const limpiarFiltros = () => { setCat("todos"); setBusqueda(""); setSoloOfertas(false); };
      const scrollAGrid = () => { if (catBarRef.current) window.scrollTo({ top: Math.max(0, catBarRef.current.offsetTop - 70), behavior: "smooth" }); };
      const accionBanner = (b) => {
        const acc = b.accion || "ofertas";
        if (acc === "nada") return;
        if (acc === "link" && b.accionUrl) { window.open(b.accionUrl, "_blank"); return; }
        if (acc === "categoria" && b.accionCat) { setSoloOfertas(false); irACategoria(b.accionCat); return; }
        // por defecto: mostrar ofertas
        setSoloOfertas(true); setCat("todos"); setBusqueda("");
        setTimeout(scrollAGrid, 60);
      };

      useEffect(() => {
        const t = setInterval(() => setSlide((s) => (s + 1) % (cfg.banners.length || 1)), 5000);
        return () => clearInterval(t);
      }, [cfg.banners.length]);

      // Splash: cuando termina de cargar, deja ver el logo un instante y hace fade
      useEffect(() => {
        if (!cargando) {
          const t1 = setTimeout(() => setSplashFade(true), 650);
          const t2 = setTimeout(() => setSplashVisible(false), 1200);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }
      }, [cargando]);

      const nombreTienda = cfg.nombre || empresa?.nombre || "Mi Tienda";
      const logoEmpresa = empresa?.logo || "";

      const cmpCat = useMemo(() => {
        const orden = cfg.ordenCategorias || [];
        return (a, b) => {
          const ia = orden.indexOf(a), ib = orden.indexOf(b);
          const ra = ia === -1 ? 9999 : ia, rb = ib === -1 ? 9999 : ib;
          return ra !== rb ? ra - rb : a.localeCompare(b);
        };
      }, [cfg.ordenCategorias]);

      const categorias = useMemo(() => {
        const set = [];
        productos.forEach((p) => { if (!set.includes(p.cat)) set.push(p.cat); });
        set.sort(cmpCat);
        return ["todos", ...set];
      }, [productos, cmpCat]);

      const visibles = useMemo(() => {
        let arr = productos.filter((p) => {
          const okCat = cat === "todos" || p.cat === cat;
          const okBusq = p.nombre.toLowerCase().includes(busqueda.toLowerCase()) || (p.codigo || "").toLowerCase().includes(busqueda.toLowerCase());
          const okOferta = !soloOfertas || p.promo;
          return okCat && okBusq && okOferta;
        });
        if (orden === "precio-asc") arr = [...arr].sort((a, b) => a.precio - b.precio);
        if (orden === "precio-desc") arr = [...arr].sort((a, b) => b.precio - a.precio);
        if (orden === "nombre") arr = [...arr].sort((a, b) => a.nombre.localeCompare(b.nombre));
        return arr;
      }, [productos, cat, busqueda, orden, soloOfertas]);

      // Armado de secciones: Ofertas arriba, luego agrupado por categoría
      const secciones = useMemo(() => {
        if (cat === "todos" && !soloOfertas) {
          const ofertas = visibles.filter((p) => p.promo);
          const resto = visibles.filter((p) => !p.promo);
          const cats = [];
          resto.forEach((p) => { if (!cats.includes(p.cat)) cats.push(p.cat); });
          cats.sort(cmpCat);
          const secs = [];
          if (ofertas.length) secs.push({ key: "ofertas", label: "🔥 Ofertas", items: ofertas });
          cats.forEach((c) => secs.push({ key: c, label: emojiCat(c) + " " + c, items: resto.filter((p) => p.cat === c) }));
          return secs;
        }
        return [{ key: "all", label: null, items: visibles }];
      }, [visibles, cat, soloOfertas, cmpCat]);

      // Reiniciar la cantidad mostrada cuando cambian los filtros
      useEffect(() => { setLimite(12); }, [cat, busqueda, soloOfertas, orden, productos]);

      // Scroll infinito: cargar más al acercarse al final
      useEffect(() => {
        const node = sentinelRef.current;
        if (!node) return;
        const obs = new IntersectionObserver((e) => {
          if (e[0].isIntersecting) setLimite((l) => l + 12);
        }, { rootMargin: "500px" });
        obs.observe(node);
        return () => obs.disconnect();
      }, [secciones, limite]);

      // Tarjeta de producto reutilizable
      const renderCard = (p) => {
        const enCarrito = carrito[p.id] || 0;
        return (
          <div key={p.id} data-prod className="rounded-2xl overflow-hidden flex flex-col transition hover:-translate-y-0.5" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
            <div data-thumb onClick={() => setDetalle(p)} className="relative h-28 flex items-center justify-center cursor-pointer" style={{ background: TEMA.bgSoft }}>
              {p.foto ? <img src={p.foto} alt={p.nombre} className="w-full h-full object-contain p-1" loading="lazy" /> : <span className="text-5xl">{emojiCat(p.cat)}</span>}
              {p.promo && <span className="absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ background: TEMA.oferta, color: "#fff" }}>PROMO</span>}
            </div>
            <div className="p-3 flex flex-col flex-1">
              <h3 onClick={() => setDetalle(p)} className="text-sm font-medium leading-snug mb-1 line-clamp-2 cursor-pointer">{p.nombre}</h3>
              <div className="mt-auto">
                <div style={{ fontFamily: "'Syne', sans-serif", color: TEMA.texto }} className="text-lg font-extrabold">{fmt(p.precio)}</div>
                {p.unidadesBulto > 1 && <div className="text-[11px]" style={{ color: TEMA.textoSuave }}>📦 caja x{p.unidadesBulto}: {fmt(p.precio * p.unidadesBulto)}</div>}
                {p.minCompra > 1 && <div className="text-[11px]" style={{ color: TEMA.textoSuave }}>mínimo {p.minCompra} u.</div>}
                {p.promo && <div className="text-[11px]" style={{ color: TEMA.ok }}>{fmt(p.promo.precio)} c/u{p.promo.cant ? ` llevando ${p.promo.cant}+` : ""}</div>}
              </div>
              {enCarrito === 0 ? (
                p.unidadesBulto > 1 ? (
                  <button onClick={() => setDetalle(p)} className="mt-2 w-full py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}>📦 Elegir opción</button>
                ) : (
                  <button onClick={(e) => agregarConVuelo(p, e)} className="mt-2 w-full py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}><Plus size={16} /> Agregar</button>
                )
              ) : (
                <div className="mt-2 w-full py-1 rounded-lg flex items-center justify-between" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }}>
                  <button onClick={() => quitar(p.id)} className="px-3 py-1"><Minus size={16} style={{ color: TEMA.gold }} /></button>
                  <span className="font-bold text-sm">{enCarrito}</span>
                  <button onClick={(e) => agregarConVuelo(p, e)} className="px-3 py-1"><Plus size={16} style={{ color: TEMA.gold }} /></button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const prodById = (id) => productos.find((x) => String(x.id) === String(id));
      const modoDe = (id) => modos[id] || "unidad";
      const precioVentaDe = (p) => modoDe(p.id) === "caja" ? p.precio * (p.unidadesBulto || 1) : p.precio;
      const qtyInicialDe = (p) => modoDe(p.id) === "caja" ? 1 : Math.max(p.minCompra || 1, p.cantDefault || 1);
      const minDe = (p) => modoDe(p.id) === "caja" ? 1 : (p.minCompra || 1);
      const elegirModo = (p, modo) => {
        setModos((m) => ({ ...m, [p.id]: modo }));
        setCarrito((c) => {
          if (!c[p.id]) return c;
          const ini = modo === "caja" ? 1 : Math.max(p.minCompra || 1, p.cantDefault || 1);
          return { ...c, [p.id]: ini };
        });
      };

      const agregar = (id) => {
        const p = prodById(id);
        setCarrito((c) => {
          const actual = c[id] || 0;
          const nueva = actual === 0 ? (p ? qtyInicialDe(p) : 1) : actual + 1;
          return { ...c, [id]: nueva };
        });
        setBump((b) => b + 1);
      };
      const agregarConVuelo = (p, e) => {
        try {
          const card = e.currentTarget.closest("[data-prod]");
          const thumb = card ? card.querySelector("[data-thumb]") : null;
          const src = (thumb || e.currentTarget).getBoundingClientRect();
          const cart = cartRef.current ? cartRef.current.getBoundingClientRect() : null;
          if (cart) {
            const id = Date.now() + "_" + Math.random();
            const fly = {
              id,
              startX: src.left + src.width / 2, startY: src.top + src.height / 2,
              endX: cart.left + cart.width / 2, endY: cart.top + cart.height / 2,
              foto: p.foto, emoji: emojiCat(p.cat),
            };
            setFlyers((arr) => [...arr, fly]);
          }
        } catch (err) { /* si algo falla, igual agrega */ }
        agregar(p.id);
      };
      const quitar = (id) => {
        const p = prodById(id);
        setCarrito((c) => {
          const actual = c[id] || 0;
          const min = p ? minDe(p) : 1;
          const nueva = actual - 1;
          const cp = { ...c };
          if (nueva < min) delete cp[id]; else cp[id] = nueva;
          return cp;
        });
      };
      const eliminar = (id) => setCarrito((c) => { const cp = { ...c }; delete cp[id]; return cp; });
      const vaciar = () => setCarrito({});

      const itemsCarrito = Object.entries(carrito).map(([id, qty]) => {
        const p = productos.find((x) => String(x.id) === String(id));
        if (!p) return null;
        const modo = modos[id] || "unidad";
        const precioVenta = modo === "caja" ? p.precio * (p.unidadesBulto || 1) : p.precio;
        return { ...p, qty, modo, precioVenta, subtotal: precioVenta * qty };
      }).filter(Boolean);
      const totalUnidades = itemsCarrito.reduce((a, i) => a + i.qty, 0);
      const totalPesos = itemsCarrito.reduce((a, i) => a + i.subtotal, 0);
      // ── Reglas de compra y envío ──
      const compraMinima = cfg.compraMinima || 0;
      const envioGratisDesde = cfg.envioGratisDesde || 0;
      const costoEnvio = cfg.costoEnvio || 0;
      const subtotal = totalPesos;                                  // productos
      const cumpleMinimo = compraMinima === 0 || subtotal >= compraMinima;
      const faltaMinimo = Math.max(0, compraMinima - subtotal);
      const envioGratis = envioGratisDesde > 0 && subtotal >= envioGratisDesde;
      const envio = (!envioGratis && costoEnvio > 0) ? costoEnvio : 0;
      const totalFinal = subtotal + envio;

      // Barra de progreso "inteligente": prioriza mínimo, luego envío gratis
      let barColor, barLabel, barPct;
      if (!cumpleMinimo) {
        barColor = TEMA.oferta; barPct = Math.min(100, (subtotal / compraMinima) * 100);
        barLabel = `Compra mínima ${fmt(compraMinima)} · te faltan ${fmt(faltaMinimo)}`;
      } else if (envioGratisDesde > 0 && !envioGratis) {
        barColor = TEMA.gold; barPct = Math.min(100, (subtotal / envioGratisDesde) * 100);
        const f = fmt(envioGratisDesde - subtotal);
        barLabel = costoEnvio > 0 ? `Te faltan ${f} para envío gratis (o ${fmt(costoEnvio)} de envío)` : `Te faltan ${f} para el envío gratis`;
      } else {
        barColor = TEMA.ok; barPct = 100;
        barLabel = envioGratis ? "🎉 ¡Tenés envío gratis!" : (costoEnvio > 0 ? `Envío: ${fmt(costoEnvio)}` : "✓ Listo para comprar");
      }

      // Inserta el pedido en backup_pedidos (sección Backup Pedidos de tu app)
      const confirmarPedido = async () => {
        if (!empresa) return;
        if (!cliNom.trim()) { alert("Poné tu nombre para confirmar el pedido."); return; }
        if (!cumpleMinimo) { alert(`La compra mínima es ${fmt(compraMinima)}. Te faltan ${fmt(faltaMinimo)}.`); return; }
        setErrorEnvio("");
        setEnviando(true);
        try {
          const itemsBackup = itemsCarrito.map((i) => {
            const esCaja = i.modo === "caja";
            const unidades = esCaja ? i.qty * (i.unidadesBulto || 1) : i.qty;
            const nombre = esCaja ? `${i.nombre} (caja x${i.unidadesBulto})` : i.nombre;
            return { id: i.codigo || String(i.id), n: nombre, c: unidades, p: i.precio, sub: unidades * i.precio, dsc: null };
          });
          if (envio > 0) itemsBackup.push({ id: "ENVIO", n: "Envío", c: 1, p: envio, sub: envio, dsc: null });
          const obsParts = ["📱 Pedido por tienda online"];
          if (cliTel.trim()) obsParts.push("Tel: " + cliTel.trim());
          if (cliDir.trim()) obsParts.push(cliDir.trim());
          if (envio > 0) obsParts.push("Envío: " + fmt(envio));
          const body = {
            empresa_id: empresa.id,
            fecha: new Date().toISOString(),
            cliente_nom: cliNom.trim().slice(0, 200),
            cliente_id: "",
            obs: obsParts.join(" · ").slice(0, 500),
            items: itemsBackup,
            total: totalFinal,
            total_con_iva: Math.round(totalFinal * 1.21 * 100) / 100,
            tipo: "pedido",
            usuario: "tienda",
            usuario_nom: "Tienda Online",
          };
          const r = await fetch(`${SB_URL}/rest/v1/backup_pedidos`, {
            method: "POST",
            headers: { ...SB_HDR, "Content-Type": "application/json", "Prefer": "return=representation" },
            body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error(await r.text());
          setPaso("exito");
        } catch (e) {
          console.error("Pedido:", e.message);
          setErrorEnvio("No se pudo enviar el pedido. Revisá tu conexión e intentá de nuevo (tu carrito no se perdió).");
        } finally { setEnviando(false); }
      };

      // Cierra el carrito y resetea todo el flujo
      const cerrarCarrito = () => { setCarritoAbierto(false); setTimeout(() => setPaso("carrito"), 200); };
      const nuevoPedido = () => { setCarrito({}); setCliNom(""); setCliTel(""); setCliDir(""); setPaso("carrito"); setCarritoAbierto(false); };
      const avisarWhatsApp = () => {
        const lineas = itemsCarrito.map((i) => `• ${i.qty}x ${i.nombre} — ${fmt(i.subtotal)}`).join("\n");
        const extra = envio > 0 ? `\nEnvío: ${fmt(envio)}` : "";
        const datos = `Cliente: ${cliNom}` + (cliTel ? `\nTel: ${cliTel}` : "") + (cliDir ? `\nDirección: ${cliDir}` : "");
        const msg = `🛒 *Nuevo pedido por la tienda*\n\n${datos}\n\n${lineas}${extra}\n\n*Total: ${fmt(totalFinal)}*`;
        const num = (cfg.whatsapp || "").replace(/[^0-9]/g, "");
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, "_blank");
      };

      /* ---- Admin ---- */
      const cfgParaEditar = () => {
        const clon = JSON.parse(JSON.stringify(cfg));
        const reales = categorias.filter((c) => c !== "todos");
        const ord = (clon.ordenCategorias || []).filter((c) => reales.includes(c));
        reales.forEach((c) => { if (!ord.includes(c)) ord.push(c); });
        clon.ordenCategorias = ord;
        return clon;
      };
      const abrirAdmin = () => { if (adminOk) { setEditCfg(cfgParaEditar()); setEditorOpen(true); } else { setLoginOpen(true); setLoginErr(""); } };
      const hacerLogin = async () => {
        if (!empresa) return;
        setLoginCargando(true); setLoginErr("");
        try {
          const ok = await validarAdmin(empresa.id, loginUid.trim(), loginPass);
          if (ok) { setAdminOk(true); setLoginOpen(false); setLoginPass(""); setEditCfg(cfgParaEditar()); setEditorOpen(true); }
          else setLoginErr("Usuario o contraseña incorrectos.");
        } catch (e) { setLoginErr("Error: " + e.message); }
        finally { setLoginCargando(false); }
      };
      const salirAdmin = () => { setAdminOk(false); setEditorOpen(false); };

      const setEF = (k, v) => setEditCfg((c) => ({ ...c, [k]: v }));
      const setBenef = (i, k, v) => setEditCfg((c) => { const b = [...c.beneficios]; b[i] = { ...b[i], [k]: v }; return { ...c, beneficios: b }; });
      const addBenef = () => setEditCfg((c) => ({ ...c, beneficios: [...c.beneficios, { icon: "star", t: "Nuevo beneficio", s: "Descripción" }] }));
      const delBenef = (i) => setEditCfg((c) => ({ ...c, beneficios: c.beneficios.filter((_, j) => j !== i) }));
      const setBan = (i, k, v) => setEditCfg((c) => { const b = [...c.banners]; b[i] = { ...b[i], [k]: v }; return { ...c, banners: b }; });
      const addBan = () => setEditCfg((c) => ({ ...c, banners: [...c.banners, { emoji: "✨", titulo: "Nuevo banner", subtitulo: "Subtítulo", cta: "Ver", accion: "ofertas" }] }));
      const delBan = (i) => setEditCfg((c) => ({ ...c, banners: c.banners.filter((_, j) => j !== i) }));
      const moverCat = (i, dir) => setEditCfg((c) => {

                  </div>
                  {/* Indicador de pasos */}
                  <div className="flex items-center gap-1.5 mt-2">
                    {["carrito", "revisar"].map((p, idx) => (
                      <div key={p} className="flex-1 h-1 rounded-full transition-all" style={{ background: (paso === "carrito" ? 0 : 1) >= idx ? TEMA.gold : TEMA.bgSoft }} />
                    ))}
                  </div>
                </div>

                {/* PASO 1: CARRITO */}
                {paso === "carrito" && (
                  <>
                    <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3 step-in">
                      {itemsCarrito.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center gap-2" style={{ color: TEMA.textoSuave }}><Store size={40} /><p className="text-sm">Tu carrito está vacío</p></div>
                      ) : itemsCarrito.map((i) => (
                        <div key={i.id} className="flex items-center gap-3 rounded-xl p-2" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
                          <div className="w-12 h-12 rounded-lg flex items-center justify-center overflow-hidden shrink-0" style={{ background: TEMA.bgSoft }}>{i.foto ? <img src={i.foto} alt="" className="w-full h-full object-contain" /> : <span className="text-2xl">{emojiCat(i.cat)}</span>}</div>
                          <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium truncate">{i.nombre}</div>
                        <div className="text-[10px]" style={{ color: TEMA.textoSuave }}>{i.modo === "caja" ? `${i.qty} caja${i.qty > 1 ? "s" : ""} × ${i.unidadesBulto}u` : `${i.qty} u.`}</div>
                        <div style={{ color: TEMA.gold }} className="text-sm font-bold">{fmt(i.subtotal)}</div>
                      </div>
                          <div className="flex items-center gap-1.5">
                            <button onClick={() => quitar(i.id)} className="p-1 rounded" style={{ background: TEMA.bgSoft }}><Minus size={14} /></button>
                            <span className="text-sm font-bold w-5 text-center">{i.qty}</span>
                            <button onClick={() => agregar(i.id)} className="p-1 rounded" style={{ background: TEMA.bgSoft }}><Plus size={14} /></button>
                            <button onClick={() => eliminar(i.id)} className="p-1 ml-1"><Trash2 size={15} style={{ color: TEMA.oferta }} /></button>
                          </div>
                        </div>
                      ))}
                    </div>
                    {itemsCarrito.length > 0 && (
                      <div className="px-4 py-3 space-y-3" style={{ borderTop: `1px solid ${TEMA.borde}` }}>
                        <div>
                          <div className="text-xs mb-1 font-medium" style={{ color: barColor }}>{barLabel}</div>
                          <div className="h-1.5 rounded-full overflow-hidden" style={{ background: TEMA.bgSoft }}><div className="h-full rounded-full transition-all" style={{ width: `${barPct}%`, background: barColor }} /></div>
                        </div>
                        {envio > 0 && (
                          <div className="text-xs space-y-0.5" style={{ color: TEMA.textoSuave }}>
                            <div className="flex justify-between"><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
                            <div className="flex justify-between"><span>Envío</span><span>{fmt(envio)}</span></div>
                          </div>
                        )}
                        <div className="flex items-center justify-between"><span style={{ color: TEMA.textoSuave }}>Total</span><span style={{ fontFamily: "'Syne', sans-serif", color: TEMA.gold }} className="text-2xl font-extrabold">{fmt(totalFinal)}</span></div>
                        <div className="flex gap-2">
                          <button onClick={vaciar} className="px-3 py-3 rounded-xl text-sm font-medium" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.textoSuave }}>Vaciar</button>
                          <button onClick={() => cumpleMinimo && setPaso("revisar")} disabled={!cumpleMinimo} className="flex-1 py-3 rounded-xl font-bold transition active:scale-95 flex items-center justify-center gap-1" style={{ background: cumpleMinimo ? TEMA.gold : TEMA.bgSoft, color: cumpleMinimo ? TEMA.bg : TEMA.textoSuave, cursor: cumpleMinimo ? "pointer" : "not-allowed" }}>
                            {cumpleMinimo ? <>Ver pedido final <ChevronRight size={18} /></> : `Faltan ${fmt(faltaMinimo)}`}
                          </button>
                        </div>
                      </div>
                    )}
                  </>
                )}

                {/* PASO 2: REVISAR + DATOS */}
                {paso === "revisar" && (
                  <>
                    <div className="flex-1 overflow-y-auto px-4 py-3 space-y-4 step-in">
                      {/* Resumen */}
                      <div>
                        <div className="text-xs font-bold mb-2" style={{ color: TEMA.gold }}>Resumen del pedido</div>
                        <div className="rounded-xl divide-y" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, borderColor: TEMA.borde }}>
                          {itemsCarrito.map((i) => (
                            <div key={i.id} className="flex items-center justify-between px-3 py-2" style={{ borderColor: TEMA.borde }}>
                              <span className="text-sm truncate mr-2"><span style={{ color: TEMA.gold }} className="font-bold">{i.qty}×</span> {i.nombre}</span>
                              <span className="text-sm font-medium shrink-0">{fmt(i.subtotal)}</span>
                            </div>
                          ))}
                          {envio > 0 && (
                            <div className="flex items-center justify-between px-3 py-1.5 text-sm" style={{ color: TEMA.textoSuave }}>
                              <span>Envío</span><span>{fmt(envio)}</span>
                            </div>
                          )}
                          <div className="flex items-center justify-between px-3 py-2.5">
                            <span className="font-bold">Total</span>
                            <span style={{ fontFamily: "'Syne', sans-serif", color: TEMA.gold }} className="text-xl font-extrabold">{fmt(totalFinal)}</span>
                          </div>
                        </div>
                      </div>
                      {/* Datos del cliente */}
                      <div>
                        <div className="text-xs font-bold mb-2" style={{ color: TEMA.gold }}>Tus datos</div>
                        <div className="space-y-2">
                          <input value={cliNom} onChange={(e) => setCliNom(e.target.value)} placeholder="Nombre / comercio *" className={inputCls} style={inputStyle} />
                          <input value={cliTel} onChange={(e) => setCliTel(e.target.value)} placeholder="Teléfono" inputMode="tel" className={inputCls} style={inputStyle} />
                          <textarea value={cliDir} onChange={(e) => setCliDir(e.target.value)} placeholder="Dirección / nota (opcional)" rows={2} className={inputCls} style={inputStyle} />
                        </div>
                      </div>
                    </div>
                    <div className="px-4 py-3" style={{ borderTop: `1px solid ${TEMA.borde}` }}>
                      {errorEnvio && (
                        <div className="mb-2 rounded-lg p-2.5 text-xs flex items-start gap-2" style={{ background: "#2a1410", border: `1px solid ${TEMA.oferta}`, color: TEMA.texto }}>
                          <AlertCircle size={15} style={{ color: TEMA.oferta }} className="shrink-0 mt-0.5" /><span>{errorEnvio}</span>
                        </div>
                      )}
                      <button onClick={confirmarPedido} disabled={enviando} className="w-full py-3.5 rounded-xl font-bold transition active:scale-95 flex items-center justify-center gap-2" style={{ background: TEMA.gold, color: TEMA.bg, opacity: enviando ? .6 : 1 }}>
                        {enviando ? "Enviando…" : (errorEnvio ? <>Reintentar · {fmt(totalFinal)}</> : <>Confirmar pedido · {fmt(totalFinal)}</>)}
                      </button>
                    </div>
                  </>
                )}
              </aside>
            </div>
          )}


          {/* MODAL LOGIN ADMIN */}
          {loginOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "#000000aa" }} onClick={() => setLoginOpen(false)}>
              <div className="w-full max-w-xs rounded-2xl p-5" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }} onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center gap-2 mb-1"><Settings size={20} style={{ color: TEMA.gold }} /><h2 style={{ fontFamily: "'Syne', sans-serif" }} className="font-extrabold text-lg">Administrar tienda</h2></div>
                <p className="text-xs mb-4" style={{ color: TEMA.textoSuave }}>Ingresá con tu usuario admin de la empresa.</p>
                <input value={loginUid} onChange={(e) => setLoginUid(e.target.value)} placeholder="Usuario" className={inputCls + " mb-2"} style={inputStyle} />
                <input value={loginPass} onChange={(e) => setLoginPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && hacerLogin()} type="password" placeholder="Contraseña" className={inputCls} style={inputStyle} />
                {loginErr && <div className="text-xs mt-2" style={{ color: TEMA.oferta }}>{loginErr}</div>}
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setLoginOpen(false)} className="px-3 py-2.5 rounded-lg text-sm" style={{ background: TEMA.bgSoft, color: TEMA.textoSuave }}>Cancelar</button>
                  <button onClick={hacerLogin} disabled={loginCargando} className="flex-1 py-2.5 rounded-lg text-sm font-bold" style={{ background: TEMA.gold, color: TEMA.bg, opacity: loginCargando ? .6 : 1 }}>{loginCargando ? "Verificando…" : "Entrar"}</button>
                </div>
              </div>
            </div>
          )}

          {/* PANEL EDITOR ADMIN */}
          {editorOpen && (
            <div className="fixed inset-0 z-50 overflow-y-auto" style={{ background: TEMA.bg }}>
              <div className="sticky top-0 z-10 px-4 py-3 flex items-center justify-between backdrop-blur" style={{ background: TEMA.bg + "ee", borderBottom: `1px solid ${TEMA.borde}` }}>
                <div className="flex items-center gap-2"><Settings size={20} style={{ color: TEMA.gold }} /><h2 style={{ fontFamily: "'Syne', sans-serif" }} className="font-extrabold text-lg">Editor de la tienda</h2></div>
                <div className="flex items-center gap-2">
                  <button onClick={salirAdmin} title="Cerrar sesión" className="p-2 rounded-lg" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.textoSuave }}><LogOut size={16} /></button>
                  <button onClick={() => setEditorOpen(false)} className="p-2 rounded-lg" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}><X size={18} /></button>
                  <button onClick={guardar} disabled={guardando} className="px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5" style={{ background: TEMA.gold, color: TEMA.bg, opacity: guardando ? .6 : 1 }}><Save size={16} /> {guardando ? "Guardando…" : "Guardar"}</button>
                </div>
              </div>

              <div className="max-w-2xl mx-auto px-4 py-5 space-y-6 pb-24">
                {/* IDENTIDAD */}
                <div>
                  <h3 className="text-sm font-bold mb-3" style={{ color: TEMA.gold }}>Identidad</h3>
                  <div className="space-y-2">
                    <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>Nombre de la tienda (vacío = nombre de la empresa)</label><input value={editCfg.nombre} onChange={(e) => setEF("nombre", e.target.value)} placeholder={empresa?.nombre || ""} className={inputCls} style={inputStyle} /></div>
                    <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>Frase / tagline</label><input value={editCfg.tagline} onChange={(e) => setEF("tagline", e.target.value)} className={inputCls} style={inputStyle} /></div>
                    <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>WhatsApp (con código país)</label><input value={editCfg.whatsapp} onChange={(e) => setEF("whatsapp", e.target.value.replace(/[^0-9]/g, ""))} placeholder="5492804..." className={inputCls} style={inputStyle} /></div>
                    <div className="pt-3 mt-1" style={{ borderTop: `1px solid ${TEMA.borde}` }}>
                      <div className="text-xs font-bold mb-2" style={{ color: TEMA.gold }}>Compra y envío</div>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>Compra mínima ($)</label><input type="number" value={editCfg.compraMinima} onChange={(e) => setEF("compraMinima", Number(e.target.value) || 0)} className={inputCls} style={inputStyle} /></div>
                        <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>Envío gratis desde ($)</label><input type="number" value={editCfg.envioGratisDesde} onChange={(e) => setEF("envioGratisDesde", Number(e.target.value) || 0)} className={inputCls} style={inputStyle} /></div>
                        <div><label className="text-xs" style={{ color: TEMA.textoSuave }}>Costo de envío ($)</label><input type="number" value={editCfg.costoEnvio} onChange={(e) => setEF("costoEnvio", Number(e.target.value) || 0)} className={inputCls} style={inputStyle} /></div>
                      </div>
                      <p className="text-[11px] mt-2 leading-relaxed" style={{ color: TEMA.textoSuave }}>
                        <b>Compra mínima:</b> 0 = sin mínimo. Si la ponés, no deja confirmar pedidos por debajo de ese monto.<br />
                        <b>Costo de envío:</b> se suma al total solo cuando el pedido no llega al "envío gratis desde" (0 = nunca cobra envío).
                      </p>
                    </div>
                  </div>
                </div>

                {/* BENEFICIOS */}
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-sm font-bold" style={{ color: TEMA.gold }}>Franja de beneficios</h3>
                    <button onClick={addBenef} className="text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}><Plus size={13} /> Agregar</button>
                  </div>
                  <div className="space-y-2">
                    {editCfg.beneficios.map((b, i) => {
                      const Ic = ICONOS[b.icon] || Star;
                      return (
                        <div key={i} className="rounded-xl p-3 flex items-start gap-2" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
                          <div className="flex flex-col items-center gap-1 pt-1"><Ic size={20} style={{ color: TEMA.gold }} />
                            <select value={b.icon} onChange={(e) => setBenef(i, "icon", e.target.value)} className="text-[10px] rounded px-1 py-0.5 outline-none" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}`, color: TEMA.texto }}>
                              {ICONO_KEYS.map((k) => <option key={k} value={k}>{k}</option>)}
                            </select>
                          </div>
                          <div className="flex-1 space-y-1.5">
                            <input value={b.t} onChange={(e) => setBenef(i, "t", e.target.value)} placeholder="Título" className={inputCls} style={inputStyle} />
                            <input value={b.s} onChange={(e) => setBenef(i, "s", e.target.value)} placeholder="Descripción" className={inputCls} style={inputStyle} />
                          </div>
                          <button onClick={() => delBenef(i)} className="p-1.5 mt-1"><Trash2 size={16} style={{ color: TEMA.oferta }} /></button>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* LISTA DE PRECIOS */}
                {listas.length > 1 && (
                  <div>
                    <h3 className="text-sm font-bold mb-1" style={{ color: TEMA.gold }}>Lista de precios</h3>
                    <p className="text-[11px] mb-3" style={{ color: TEMA.textoSuave }}>Elegí qué lista de precios ven los clientes en la tienda. La empresa tiene {listas.length} listas.</p>
                    <select value={editCfg.listaPrecio || listaActiva} onChange={(e) => setEditCfg((c) => ({ ...c, listaPrecio: e.target.value }))}
                      className="w-full px-3 py-2.5 rounded-xl text-sm outline-none" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.texto }}>
                      {listas.map((l) => <option key={l.key} value={l.key}>{l.nombre}</option>)}
                    </select>
                  </div>
                )}

                {/* ORDEN DE CATEGORÍAS */}
                <div>
                  <h3 className="text-sm font-bold mb-1" style={{ color: TEMA.gold }}>Orden de categorías</h3>
                  <p className="text-[11px] mb-3" style={{ color: TEMA.textoSuave }}>Definí en qué orden se muestran en la tienda. Las "Ofertas" siempre van primero.</p>
                  {(!editCfg.ordenCategorias || editCfg.ordenCategorias.length === 0) ? (
                    <p className="text-xs" style={{ color: TEMA.textoSuave }}>No hay categorías cargadas todavía.</p>
                  ) : (
                    <div className="space-y-2">
                      {editCfg.ordenCategorias.map((c, i) => (
                        <div key={c} className="rounded-xl px-3 py-2 flex items-center gap-2" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
                          <span className="text-xs font-bold w-5 text-center" style={{ color: TEMA.textoSuave }}>{i + 1}</span>
                          <span className="text-sm flex-1 truncate">{emojiCat(c)} {c}</span>
                          <button onClick={() => moverCat(i, -1)} disabled={i === 0} className="p-1.5 rounded" style={{ background: TEMA.bgSoft, opacity: i === 0 ? .3 : 1 }}><ChevronRight size={16} style={{ transform: "rotate(-90deg)", color: TEMA.gold }} /></button>
                          <button onClick={() => moverCat(i, 1)} disabled={i === editCfg.ordenCategorias.length - 1} className="p-1.5 rounded" style={{ background: TEMA.bgSoft, opacity: i === editCfg.ordenCategorias.length - 1 ? .3 : 1 }}><ChevronRight size={16} style={{ transform: "rotate(90deg)", color: TEMA.gold }} /></button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* BANNERS */}
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-sm font-bold" style={{ color: TEMA.gold }}>Banners / promos</h3>
                    <button onClick={addBan} className="text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}><Plus size={13} /> Agregar</button>
                  </div>
                  <div className="space-y-2">
                    {editCfg.banners.map((b, i) => (
                      <div key={i} className="rounded-xl p-3 flex items-start gap-2" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
                        <input value={b.emoji} onChange={(e) => setBan(i, "emoji", e.target.value)} className="w-12 text-center text-2xl rounded-lg py-1 outline-none" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }} maxLength={2} />
                        <div className="flex-1 space-y-1.5">
                          <input value={b.titulo} onChange={(e) => setBan(i, "titulo", e.target.value)} placeholder="Título" className={inputCls} style={inputStyle} />
                          <input value={b.subtitulo} onChange={(e) => setBan(i, "subtitulo", e.target.value)} placeholder="Subtítulo" className={inputCls} style={inputStyle} />
                          <input value={b.cta} onChange={(e) => setBan(i, "cta", e.target.value)} placeholder="Texto del botón" className={inputCls} style={inputStyle} />
                          <select value={b.accion || "ofertas"} onChange={(e) => setBan(i, "accion", e.target.value)} className={inputCls} style={inputStyle}>
                            <option value="ofertas">Al tocar: mostrar ofertas</option>
                            <option value="categoria">Al tocar: ir a una categoría</option>
                            <option value="link">Al tocar: abrir un link</option>
                            <option value="nada">Al tocar: no hacer nada</option>
                          </select>
                          {b.accion === "categoria" && (
                            <select value={b.accionCat || ""} onChange={(e) => setBan(i, "accionCat", e.target.value)} className={inputCls} style={inputStyle}>
                              <option value="">— Elegí categoría —</option>
                              {categorias.filter((c) => c !== "todos").map((c) => <option key={c} value={c}>{c}</option>)}
                            </select>
                          )}
                          {b.accion === "link" && (
                            <input value={b.accionUrl || ""} onChange={(e) => setBan(i, "accionUrl", e.target.value)} placeholder="https://…" className={inputCls} style={inputStyle} />
                          )}
                        </div>
                        <button onClick={() => delBan(i)} className="p-1.5 mt-1"><Trash2 size={16} style={{ color: TEMA.oferta }} /></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Tienda />);
  </script>
</body>
</html>
