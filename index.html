<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #0a1628; }
    /* Números de precios parejos y prolijos (no "old-style") */
    [data-precio], .precio-num { font-variant-numeric: tabular-nums lining-nums; font-feature-settings: "tnum" 1, "lnum" 1; }
    @media (prefers-color-scheme: light) {
      body { background: #f4f6fa; }
    }
    /* Evita el auto-zoom de iOS al enfocar campos (necesita >=16px) */
    input, textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 99px; }

    @keyframes cartBump { 0%{transform:scale(1)} 35%{transform:scale(1.5)} 70%{transform:scale(.85)} 100%{transform:scale(1)} }
    .cart-bump { animation: cartBump .45s ease; }

    @keyframes flyUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-34px) scale(1.4);opacity:0} }
    .fly-up { animation: flyUp .7s ease forwards; }

    @keyframes stepIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
    .step-in { animation: stepIn .28s ease; }

    @keyframes ringPulse { 0%{transform:scale(.4);opacity:.55} 80%{opacity:0} 100%{transform:scale(2.6);opacity:0} }
    .ring-pulse { animation: ringPulse 1.1s ease-out forwards; }

    @keyframes checkPop { 0%{transform:scale(0) rotate(-25deg)} 55%{transform:scale(1.25) rotate(6deg)} 100%{transform:scale(1) rotate(0)} }
    .check-pop { animation: checkPop .6s cubic-bezier(.18,.9,.32,1.3) forwards; }

    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    .draw-check { stroke-dasharray: 40; stroke-dashoffset: 40; animation: drawCheck .5s .28s ease forwards; }

    @keyframes titlePop { 0%{opacity:0;transform:translateY(12px) scale(.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }
    .title-pop { animation: titlePop .5s .35s ease both; }

    @keyframes confFall { 0%{transform:translateY(-12vh) rotate(0);opacity:1} 100%{transform:translateY(86vh) rotate(720deg);opacity:0} }
    .conf { position:absolute; top:0; width:10px; height:14px; border-radius:2px; animation: confFall linear forwards; }

    @keyframes splashIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .splash-in { animation: splashIn .5s cubic-bezier(.18,.9,.32,1.2) both; }
    @keyframes softFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes floatUp { 0%{transform:translateY(20px) scale(.6);opacity:0} 15%{opacity:.85} 85%{opacity:.85} 100%{transform:translateY(-130px) scale(1);opacity:0} }
    .pcl { position:absolute; bottom:-12px; border-radius:50%; pointer-events:none; animation:floatUp linear infinite; }
    .soft-float { animation: softFloat 2.4s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { border-radius:50%; border:3px solid #1e3a5f; border-top-color:#c9933a; animation: spin .8s linear infinite; }
    @keyframes barGrow { 0%{width:8%} 50%{width:70%} 100%{width:96%} }
    .bar-grow { animation: barGrow 1.4s ease-in-out infinite alternate; }

    /* Animación de vaciar carrito: los items caen al tacho */
    @keyframes itemAlTacho {
      0%   { transform: translateY(0) scale(1) rotate(0); opacity:1; }
      30%  { transform: translateY(-18px) scale(.95) rotate(-6deg); opacity:1; }
      100% { transform: translateY(120px) scale(.3) rotate(22deg); opacity:0; }
    }
    .item-al-tacho { animation: itemAlTacho .6s cubic-bezier(.55,0,.7,.5) forwards; }
    @keyframes tachoShake {
      0%,100% { transform: rotate(0); }
      20% { transform: rotate(-12deg); }
      40% { transform: rotate(10deg); }
      60% { transform: rotate(-7deg); }
      80% { transform: rotate(4deg); }
    }
    .tacho-shake { animation: tachoShake .5s ease-in-out; transform-origin: bottom center; }
    @keyframes tachoTapa {
      0% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-8px) rotate(-18deg); }
      100% { transform: translateY(0) rotate(0); }
    }
    .tacho-tapa { animation: tachoTapa .5s ease; transform-origin: right center; }
    @keyframes overlayFadeTacho { 0%{opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    .overlay-tacho { animation: overlayFadeTacho 1.1s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    /* @jsxRuntime classic */
    const { useState, useEffect, useMemo, useRef } = React;

    // Silenciar logs de debug en producción (web real). En local se mantienen
    // para depurar. console.error siempre queda activo para no perder errores.
    (function(){
      try {
        var host = (location && location.hostname) ? location.hostname : "";
        var esLocal = (host === "localhost" || host === "127.0.0.1" || host === "" || host.indexOf("192.168.") === 0);
        if(!esLocal){
          var _noop=function(){};
          console.log=_noop; console.warn=_noop; console.info=_noop; console.debug=_noop;
        }
      } catch(e){}
    })();

    /* ============================================================
       CONFIGURACIÓN BASE  (defaults; el admin de cada empresa los pisa)
       ============================================================ */
    const EMP_CODIGO_DEFAULT = "";          // respaldo si no hay ?emp= en la URL
    const LISTA_PRECIO = "clientes";        // "clientes" | "patagonia" | lista_key del jsonb

    const TEMA_OSCURO = {
      bg: "#0a1628", bgCard: "#0f1f38", bgSoft: "#13294b", borde: "#1e3a5f",
      gold: "#c9933a", goldSoft: "#e0b35e", texto: "#e8eef7", textoSuave: "#9bb0cc",
      oferta: "#e8543f", ok: "#3fbf7f",
    };
    const TEMA_CLARO = {
      bg: "#f4f6fa", bgCard: "#ffffff", bgSoft: "#eef2f8", borde: "#d8e0ec",
      gold: "#b07d28", goldSoft: "#c9933a", texto: "#1a2436", textoSuave: "#5d6b82",
      oferta: "#d9402b", ok: "#2a9d63",
    };

    // Config visual por defecto (se completa/pisa con lo que guarde el admin)
    const CFG_DEFAULT = {
      nombre: "",                 // vacío => usa el nombre de la empresa
      tagline: "Catálogo online",
      whatsapp: "5492804000000",
      compraMinima: 0,            // 0 = sin mínimo. Si >0, no deja comprar por debajo.
      envioGratisDesde: 50000,    // 0 = no aplica envío gratis por monto
      costoEnvio: 0,              // tarifa si no llega al envío gratis. 0 = sin cargo
      ordenCategorias: [],        // orden manual de categorías (vacío = alfabético)
      listaPrecio: "",            // lista de precios a mostrar (vacío = la primera/clientes)
      horarios: "",               // horario de atención (texto libre, ej: "Lun a Vie 8-18h")
      direccionTienda: "",        // dirección física / zona de entrega
      infoEntrega: "",            // info de entrega/reparto (ej: "Reparto Lun y Jue")
      beneficios: [
        { icon: "truck",  t: "Envío gratis",     s: "Desde $50.000" },
        { icon: "shield", t: "Compra segura",    s: "Pago protegido" },
        { icon: "clock",  t: "Entrega 24/48h",   s: "En toda la zona" },
      ],
      banners: [
        { emoji: "🏷️", titulo: "Ofertas de la semana", subtitulo: "Aprovechá los precios promocionales", cta: "Ver promos", accion: "ofertas" },
        { emoji: "🚚", titulo: "Envío gratis",          subtitulo: "En compras grandes",                cta: "Empezar" },
        { emoji: "📦", titulo: "Catálogo completo",      subtitulo: "Todos nuestros productos",          cta: "Explorar" },
      ],
    };
    const GRADS_OSCURO = [
      "linear-gradient(120deg, #1a3a5c 0%, #0a1628 60%)",
      "linear-gradient(120deg, #3a2a10 0%, #0a1628 60%)",
      "linear-gradient(120deg, #102b22 0%, #0a1628 60%)",
      "linear-gradient(120deg, #2a1430 0%, #0a1628 60%)",
    ];
    const GRADS_CLARO = [
      "linear-gradient(120deg, #2c5a86 0%, #4a7fae 100%)",
      "linear-gradient(120deg, #a8742a 0%, #c9933a 100%)",
      "linear-gradient(120deg, #1f6b52 0%, #36997a 100%)",
      "linear-gradient(120deg, #6b3a78 0%, #9159a0 100%)",
    ];

    /* ============================================================
       SUPABASE (REST, igual que tu app)
       ============================================================ */
    const SB_URL = "https://vhoswhyixqtomgqudigj.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3N3aHlpeHF0b21ncXVkaWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTI4ODIsImV4cCI6MjA5NTM4ODg4Mn0.gjUaVJ1RvF3KrjfXVyh8wYIso4QW6RtIfFRbkd0PyA8";
    const SB_HDR = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY };

    async function sbGet(table, params) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: SB_HDR });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }
    async function sbUpsert(table, row, onConflict) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
        method: "POST",
        headers: { ...SB_HDR, "Content-Type": "application/json", "Prefer": "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(row),
      });
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    async function resolverEmpresa(codigo) {
      const emps = await sbGet("empresas", `select=id,codigo,nombre,logo,color,appname&codigo=eq.${encodeURIComponent(codigo)}`);
      return emps && emps[0] ? emps[0] : null;
    }
    async function fetchConfig(empId) {
      const rows = await sbGet("tienda_config", `select=config&empresa_id=eq.${empId}`);
      return rows && rows[0] ? rows[0].config : null;
    }
    async function guardarConfig(empId, config) {
      return sbUpsert("tienda_config", { empresa_id: empId, config, updated_at: new Date().toISOString() }, "empresa_id");
    }
    async function validarAdmin(empId, uid, pass, empCodigo) {
      // Validación ÚNICAMENTE con la función segura del servidor (verificar_login).
      // No se lee ni compara la columna pass en texto plano (las contraseñas están hasheadas).
      // Devuelve: { ok:true, user } | { ok:false, motivo:"credenciales"|"empresa"|"red" }
      if (!empCodigo) return { ok: false, motivo: "empresa" };
      try {
        const r = await fetch(`${SB_URL}/rest/v1/rpc/verificar_login`, {
          method: "POST",
          headers: { ...SB_HDR, "Content-Type": "application/json" },
          body: JSON.stringify({ p_emp_codigo: empCodigo, p_uid: uid, p_pass: pass }),
        });
        if (!r.ok) return { ok: false, motivo: "red" };
        const u = await r.json();
        // verificar_login devuelve el usuario si las credenciales son válidas, o null si no.
        if (u && u.id) {
          if (u.role === "admin") return { ok: true, user: u };
          return { ok: false, motivo: "credenciales" }; // existe pero no es admin
        }
        return { ok: false, motivo: "credenciales" };
      } catch (e) {
        return { ok: false, motivo: "red" };
      }
    }

    function precioEfectivo(p, listaKey) {
      if (p.preciosJson && p.preciosJson[listaKey] > 0) return p.preciosJson[listaKey];
      const lk = (listaKey || "").toLowerCase();
      if (lk.includes("patagon")) return p.precioPatagonia || p.precioClientes || p.precioBase || 0;
      if (lk.includes("cliente")) return p.precioClientes || p.precioBase || 0;
      return p.precioClientes || p.precioBase || 0;
    }
    function mapProducto(p) {
      const promo = (p.precio_promo && p.precio_promo > 0) ? { precio: p.precio_promo, cant: p.cant_promo || 0 } : null;
      // Oferta: vigente si está activa, tiene datos (% o precio) y no venció.
      // La tienda usa el precio de la lista "Clientes" (cli).
      let oferta = null;
      if (p.oferta_activa) {
        let vigente = true;
        if (p.oferta_hasta) {
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          const hasta = new Date(p.oferta_hasta + "T23:59:59");
          vigente = hasta >= hoy;
        }
        if (vigente) {
          const tipo = p.oferta_tipo || "fijo";
          const normalCli = p.precio_clientes || p.precio_base || 0;
          let precioOf = null;
          if (tipo === "pct") {
            const pct = p.oferta_pct || 0;
            if (pct > 0 && pct < 100 && normalCli > 0) {
              precioOf = Math.round(normalCli * (1 - pct/100) * 100) / 100;
            }
          } else {
            // fijo: precio por lista (cli), o precio viejo
            const precios = p.oferta_precios || null;
            if (precios && precios.cli != null && precios.cli > 0) precioOf = precios.cli;
            else if (p.oferta_precio && p.oferta_precio > 0) precioOf = p.oferta_precio;
          }
          if (precioOf && precioOf > 0 && precioOf < normalCli) {
            oferta = { precio: precioOf, hasta: p.oferta_hasta || null };
          }
        }
      }
      return {
        id: p.id, codigo: p.codigo || "", nombre: p.nombre || "Sin nombre",
        cat: p.categoria || "Sin categoría", activo: p.activo !== false, foto: p.foto || "", fotos: Array.isArray(p.fotos) ? p.fotos : [], promo, oferta,
        familia: p.familia || null, esPortada: p.es_portada || false,
        precioClientes: p.precio_clientes || 0,
        precioPatagonia: p.precio_patagonia || 0,
        precioBase: p.precio_base || 0,
        preciosJson: p.precios || {},
        unidadVenta: p.unidad_venta || "unidad",
        unidadesBulto: p.unidades_bulto || 1,
        minCompra: p.min_compra || 1,
        cantDefault: p.cant_default || 1,
      };
    }
    async function fetchListas(empId) {
      try {
        const rows = await sbGet("listas_precios", `select=lista_key,nombre,orden&empresa_id=eq.${empId}&order=orden.asc`);
        return (rows || []).map((l) => ({ key: l.lista_key, nombre: l.nombre || l.lista_key }));
      } catch (e) { return []; }
    }
    // ── Caché de catálogo en IndexedDB (reduce egress: no re-baja fotos en cada visita) ──
    let _idbDB = null;
    function idbOpen() {
      return new Promise((res) => {
        if (_idbDB) return res(_idbDB);
        try {
          const rq = indexedDB.open("tienda_cache", 1);
          rq.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains("kv")) db.createObjectStore("kv"); };
          rq.onsuccess = (e) => { _idbDB = e.target.result; res(_idbDB); };
          rq.onerror = () => res(null);
        } catch (e) { res(null); }
      });
    }
    function idbGet(key) {
      return idbOpen().then((db) => {
        if (!db) return null;
        return new Promise((res) => {
          try { const rq = db.transaction("kv", "readonly").objectStore("kv").get(key); rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null); }
          catch (e) { res(null); }
        });
      });
    }
    function idbSet(key, val) {
      return idbOpen().then((db) => {
        if (!db) return;
        return new Promise((res) => {
          try { const rq = db.transaction("kv", "readwrite").objectStore("kv").put(val, key); rq.onsuccess = () => res(); rq.onerror = () => res(); }
          catch (e) { res(); }
        });
      });
    }
    async function fetchCatVer(empId) {
      try { const r = await sbGet("empresas", `select=cat_ver&id=eq.${empId}`); return (r && r[0]) ? r[0].cat_ver : null; }
      catch (e) { return null; }
    }

    async function fetchProductos(empId) {
      const ckey = "tienda_prod_" + empId;
      const ver = await fetchCatVer(empId);
      // Si el catálogo no cambió, usar la copia local (NO baja fotos => ahorra egress)
      if (ver) {
        try { const cc = await idbGet(ckey); if (cc && cc.ver === ver && cc.data) return cc.data; } catch (e) {}
      }
      const COLS = "id,codigo,nombre,categoria,precio_base,precio_clientes,precio_patagonia,precios,foto,precio_promo,cant_promo,familia,es_portada";
      const COLS_NEW = COLS + ",unidad_venta,unidades_bulto,min_compra,cant_default,oferta_precio,oferta_activa,oferta_hasta,oferta_tipo,oferta_pct,oferta_precios,activo,fotos";
      let rows;
      try { rows = await sbGet("productos", `select=${COLS_NEW}&empresa_id=eq.${empId}&order=nombre.asc`); }
      catch (e) { rows = await sbGet("productos", `select=${COLS}&empresa_id=eq.${empId}&order=nombre.asc`); }
      if (!rows) {
        try { const c2 = await idbGet(ckey); if (c2 && c2.data) return c2.data; } catch (e) {}
        return [];
      }
      const prods = rows.map(mapProducto);
      try { await idbSet(ckey, { ver, ts: Date.now(), data: prods }); } catch (e) {}
      return prods;
    }

    // Portadas de familia (foto + título lindo) desde la tabla familias
    async function fetchFamilias(empId) {
      try {
        const rows = await sbGet("familias", `select=familia,titulo,foto&empresa_id=eq.${empId}`);
        const m = {};
        (rows || []).forEach((f) => { m[f.familia] = { titulo: f.titulo || "", foto: f.foto || "" }; });
        return m;
      } catch (e) { return {}; }
    }

    // Calcula los productos más pedidos leyendo backup_pedidos (últimos 200 pedidos).
    // Devuelve un array de IDs de producto ordenados por cantidad de veces pedidos.
    async function fetchMasVendidos(empId) {
      try {
        const rows = await sbGet("backup_pedidos", `select=items&empresa_id=eq.${empId}&order=fecha.desc&limit=1000`);
        if (!rows || !rows.length) return [];
        const conteo = {};
        rows.forEach((ped) => {
          let items = ped.items;
          if (typeof items === "string") { try { items = JSON.parse(items); } catch (_) { items = []; } }
          if (!Array.isArray(items)) return;
          items.forEach((it) => {
            const id = it && (it.id != null ? String(it.id) : null);
            if (!id || id === "ENVIO") return;
            const cant = Number(it.c) || 1;
            conteo[id] = (conteo[id] || 0) + cant;
          });
        });
        return Object.entries(conteo).sort((a, b) => b[1] - a[1]).map(([id]) => id);
      } catch (e) { return []; }
    }

    // Construye el mapa de "comprados juntos": para cada producto, qué otros
    // aparecen en los mismos pedidos y cuántas veces. Devuelve { idProd: [idsSugeridos...] }.
    async function fetchCompradosJuntos(empId) {
      try {
        const rows = await sbGet("backup_pedidos", `select=items&empresa_id=eq.${empId}&order=fecha.desc&limit=1000`);
        if (!rows || !rows.length) return {};
        const co = {}; // co[a][b] = veces que a y b aparecieron juntos
        rows.forEach((ped) => {
          let items = ped.items;
          if (typeof items === "string") { try { items = JSON.parse(items); } catch (_) { items = []; } }
          if (!Array.isArray(items)) return;
          // ids únicos del pedido (sin ENVIO ni repetidos)
          const ids = [...new Set(items.map((it) => it && it.id != null ? String(it.id) : null).filter((x) => x && x !== "ENVIO"))];
          for (let i = 0; i < ids.length; i++) {
            for (let j = 0; j < ids.length; j++) {
              if (i === j) continue;
              const a = ids[i], b = ids[j];
              if (!co[a]) co[a] = {};
              co[a][b] = (co[a][b] || 0) + 1;
            }
          }
        });
        // Para cada producto, ordenar sus acompañantes por frecuencia y quedarnos con los top
        const mapa = {};
        Object.keys(co).forEach((a) => {
          mapa[a] = Object.entries(co[a])
            .filter(([, n]) => n >= 2)               // al menos 2 pedidos juntos (filtra casualidad)
            .sort((x, y) => y[1] - x[1])
            .slice(0, 8)
            .map(([id]) => id);
        });
        return mapa;
      } catch (e) { return {}; }
    }

    // Mezcla la config guardada con los defaults (por si faltan claves)
    function mergeCfg(saved) {
      if (!saved) return { ...CFG_DEFAULT };
      return {
        ...CFG_DEFAULT, ...saved,
        beneficios: Array.isArray(saved.beneficios) ? saved.beneficios : CFG_DEFAULT.beneficios,
        banners: Array.isArray(saved.banners) ? saved.banners : CFG_DEFAULT.banners,
        ordenCategorias: Array.isArray(saved.ordenCategorias) ? saved.ordenCategorias : [],
        listaPrecio: typeof saved.listaPrecio === "string" ? saved.listaPrecio : "",
      };
    }

    const emojiCat = (nombre) => {
      const n = (nombre || "").toLowerCase();
      if (/bebida|gaseosa|agua|cerveza|vino|jugo/.test(n)) return "🥤";
      if (/limpie|deterg|lavand/.test(n)) return "🧼";
      if (/lacteo|leche|queso|yogur/.test(n)) return "🧀";
      if (/snack|galleti|papa|golosi|chocolate/.test(n)) return "🍪";
      if (/almac|fideo|arroz|aceite|yerba|azuc|harina|conserva/.test(n)) return "🥫";
      if (/bazar|hogar|vaso|cocina/.test(n)) return "🍽️";
      if (/pila|electr/.test(n)) return "🔋";
      if (/perfu|higien|cosme/.test(n)) return "🧴";

    function Flyer({ f, onDone }) {

      useEffect(() => {
        const r = requestAnimationFrame(() => requestAnimationFrame(() => setMoved(true)));
        const t = setTimeout(onDone, 720);
        return () => { cancelAnimationFrame(r); clearTimeout(t); };
      }, []);
      return (
        <div style={{ position: "fixed", left: 0, top: 0, zIndex: 80, pointerEvents: "none",

    function Particulas({ cantidad = 26 }) {
      const items = useMemo(() => Array.from({ length: cantidad }).map(() => {
        const sz = 3 + Math.random() * 7;
        return {
          left: Math.random() * 100,
          size: sz,
          dur: 7 + Math.random() * 7,
          delay: -Math.random() * 12,
          op: 0.25 + Math.random() * 0.45,
          gold: Math.random() > 0.45,
        };
      }), [cantidad]);
      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
          {items.map((p, i) => (
            <span key={i} className="pcl" style={{
              left: p.left + "%", width: p.size, height: p.size,
              background: p.gold ? "#c9933a" : "#e0b35e",
              opacity: p.op,
              boxShadow: `0 0 ${p.size * 2}px ${p.gold ? "#c9933a" : "#e0b35e"}`,

    function Galeria({ fotos, alt, cat }) {
  const imgs = (fotos || []).filter(Boolean);
  const [idx, setIdx] = React.useState(0);
  const touchX = React.useRef(null);
  React.useEffect(() => { setIdx(0); }, [alt]);
  if (!imgs.length) return <span className="text-7xl">{emojiCat(cat)}</span>;
  const go = (d) => setIdx((x) => (x + d + imgs.length) % imgs.length);
  return (
    <div className="relative w-full h-full"
      onTouchStart={(e) => { touchX.current = e.touches[0].clientX; }}
      onTouchEnd={(e) => { if (touchX.current == null) return; const dx = e.changedTouches[0].clientX - touchX.current; if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1); touchX.current = null; }}>
      <img src={imgs[idx]} alt={alt} className="w-full h-full object-contain p-3" />
      {imgs.length > 1 && (
        <React.Fragment>
          <button type="button" onClick={() => go(-1)} className="absolute left-1 w-8 h-8 rounded-full flex items-center justify-center text-lg" style={{ top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,.45)", color: "#fff" }}>‹</button>
          <button type="button" onClick={() => go(1)} className="absolute right-1 w-8 h-8 rounded-full flex items-center justify-center text-lg" style={{ top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,.45)", color: "#fff" }}>›</button>
          <div className="absolute left-0 right-0 flex justify-center gap-1" style={{ bottom: 6 }}>
            {imgs.map((_, k) => <span key={k} onClick={() => setIdx(k)} style={{ width: 7, height: 7, borderRadius: "50%", cursor: "pointer", background: k === idx ? "#c9933a" : "rgba(255,255,255,.5)" }}></span>)}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

        const handler = (e) => setPrefiereOscuro(e.matches);
        try { mq.addEventListener("change", handler); } catch (_) { try { mq.addListener(handler); } catch (_) {} }
        return () => { try { mq.removeEventListener("change", handler); } catch (_) { try { mq.removeListener(handler); } catch (_) {} } };
      }, []);

        })();
      }, []);

      // Restaurar carrito guardado al resolver la empresa
      useEffect(() => {
        if (!empresa || restoredRef.current) return;
        restoredRef.current = true;
        try {
          const raw = localStorage.getItem("tienda_cart_" + empresa.codigo);
          if (raw) {
            const d = JSON.parse(raw);
            if (d.carrito && typeof d.carrito === "object") setCarrito(d.carrito);
            if (d.modos && typeof d.modos === "object") setModos(d.modos);
            if (d.cliNom) setCliNom(d.cliNom);
            if (d.cliTel) setCliTel(d.cliTel);
            if (d.cliDir) setCliDir(d.cliDir);
          }
          // Cargar el último pedido confirmado (para "repetir pedido")
          const rawUlt = localStorage.getItem("tienda_ultped_" + empresa.codigo);
          if (rawUlt) {
            const u = JSON.parse(rawUlt);
            if (u && u.carrito && Object.keys(u.carrito).length) setUltimoPedido(u);
          }
        } catch (e) { /* localStorage no disponible (modo privado) */ }
      }, [empresa]);

      // Guardar carrito + datos del cliente ante cualquier cambio
      useEffect(() => {
        if (!empresa || !restoredRef.current) return;
        try {
          localStorage.setItem("tienda_cart_" + empresa.codigo, JSON.stringify({ carrito, modos, cliNom, cliTel, cliDir }));
        } catch (e) { /* sin persistencia */ }
      }, [carrito, modos, cliNom, cliTel, cliDir, empresa]);

      // Mostrar botón "volver arriba" al scrollear
      useEffect(() => {
        const onScroll = () => setShowTop(window.scrollY > 600);
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // Bloquear scroll del fondo cuando hay un panel abierto (evita que se mueva todo en iOS)
      useEffect(() => {
        const abierto = carritoAbierto || !!detalle || loginOpen || editorOpen;
        if (!abierto) return;
        const scrollY = window.scrollY;
        const b = document.body;
        b.style.position = "fixed";
        b.style.top = `-${scrollY}px`;
        b.style.left = "0";
        b.style.right = "0";
        b.style.width = "100%";
        return () => {
          b.style.position = "";
          b.style.top = "";
          b.style.left = "";
          b.style.right = "";
          b.style.width = "";
          window.scrollTo(0, scrollY);
        };
      }, [carritoAbierto, detalle, loginOpen, editorOpen]);
      const scrollArriba = () => window.scrollTo({ top: 0, behavior: "smooth" });
      const irACategoria = (c) => {
        setCat(c);
        setTimeout(() => {
          if (catBarRef.current) window.scrollTo({ top: Math.max(0, catBarRef.current.offsetTop - 70), behavior: "smooth" });
        }, 60);
      };
      const limpiarFiltros = () => { setCat("todos"); setBusqueda(""); setSoloOfertas(false); };
      const scrollAGrid = () => { if (catBarRef.current) window.scrollTo({ top: Math.max(0, catBarRef.current.offsetTop - 70), behavior: "smooth" }); };
      const accionBanner = (b) => {
        const acc = b.accion || "ofertas";
        if (acc === "nada") return;
        if (acc === "link" && b.accionUrl) { window.open(b.accionUrl, "_blank"); return; }
        if (acc === "categoria" && b.accionCat) { setSoloOfertas(false); irACategoria(b.accionCat); return; }
        // por defecto: mostrar ofertas
        setSoloOfertas(true); setCat("todos"); setBusqueda("");
        setTimeout(scrollAGrid, 60);
      };

      useEffect(() => {
        const t = setInterval(() => setSlide((s) => (s + 1) % (cfg.banners.length || 1)), 5000);
        return () => clearInterval(t);
      }, [cfg.banners.length]);

      // Splash: cuando termina de cargar, deja ver el logo un instante y hace fade
      useEffect(() => {
        if (!cargando) {
          const t1 = setTimeout(() => setSplashFade(true), 650);
          const t2 = setTimeout(() => setSplashVisible(false), 1200);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }
      }, [cargando]);

      const nombreTienda = cfg.nombre || empresa?.nombre || "Mi Tienda";
      const logoEmpresa = empresa?.logo || "";

      const cmpCat = useMemo(() => {
        const orden = cfg.ordenCategorias || [];
        return (a, b) => {
          const ia = orden.indexOf(a), ib = orden.indexOf(b);
          const ra = ia === -1 ? 9999 : ia, rb = ib === -1 ? 9999 : ib;
          return ra !== rb ? ra - rb : a.localeCompare(b);
        };
      }, [cfg.ordenCategorias]);

      const categorias = useMemo(() => {
        const set = [];
        productos.forEach((p) => { if (!set.includes(p.cat)) set.push(p.cat); });
        set.sort(cmpCat);
        return ["todos", ...set];
      }, [productos, cmpCat]);

      const visibles = useMemo(() => {
        let arr = productos.filter((p) => {
          const okCat = cat === "todos" || p.cat === cat;
          const okBusq = p.nombre.toLowerCase().includes(busqueda.toLowerCase()) || (p.codigo || "").toLowerCase().includes(busqueda.toLowerCase());
          const okOferta = !soloOfertas || p.promo || p.enOferta;
          return okCat && okBusq && okOferta && (p.activo !== false);
        });
        // Agrupar por familia: cada familia se representa con su portada (1 tarjeta).
        // Si hay búsqueda activa, NO agrupamos (para poder encontrar variantes puntuales).
        if (!busqueda) {
          const familias = {};
          const agrupado = [];
          arr.forEach((p) => {
            if (p.familia) {
              if (!familias[p.familia]) {
                familias[p.familia] = { items: [] };
                agrupado.push({ _famKey: p.familia, _esFamilia: true });
              }
              familias[p.familia].items.push(p);
            } else {
              agrupado.push(p);
            }
          });
          // Para cada familia, representar con la portada de la tabla (foto/título) o fallback
          arr = agrupado.map((cel) => {
            if (!cel._esFamilia) return cel;
            const items = familias[cel._famKey].items;
            const port = famPortadas[cel._famKey] || null;
            const repr = items.find((x) => x.foto) || items[0];
            const precios = items.map((x) => x.precio).filter((v) => v > 0);
            const minP = precios.length ? Math.min(...precios) : 0;
            const hayOferta = items.some((x) => x.enOferta);
            const hayPromo = items.some((x) => x.promo);
            return {
              ...repr,
              id: "fam:" + cel._famKey,
              nombre: (port && port.titulo) ? port.titulo : cel._famKey,
              foto: (port && port.foto) ? port.foto : (repr.foto || ""),
              _esFamilia: true,
              _famNombre: cel._famKey,
              _variantes: items,
              _nVariantes: items.length,
              precio: minP,
              precioAntes: null,
              enOferta: hayOferta,
              promo: hayPromo ? repr.promo : null,
            };
          });
        }
        if (orden === "precio-asc") arr = [...arr].sort((a, b) => a.precio - b.precio);
        if (orden === "precio-desc") arr = [...arr].sort((a, b) => b.precio - a.precio);
        if (orden === "nombre") arr = [...arr].sort((a, b) => a.nombre.localeCompare(b.nombre));
        return arr;
      }, [productos, cat, busqueda, orden, soloOfertas, famPortadas]);

      // Armado de secciones: Más pedidos + Ofertas arriba, luego agrupado por categoría
      const secciones = useMemo(() => {
        if (cat === "todos" && !soloOfertas && !busqueda) {
          const ofertas = visibles.filter((p) => p.promo || p.enOferta);
          const cats = [];
          visibles.forEach((p) => { if (!cats.includes(p.cat)) cats.push(p.cat); });
          cats.sort(cmpCat);
          const secs = [];
          // Más pedidos: top productos según historial (máx 6), solo si hay datos
          if (masVendidos.length) {
            const topIds = masVendidos.slice(0, 6);
            const topProds = topIds.map((id) => visibles.find((p) => String(p.id) === String(id) || String(p.codigo) === String(id))).filter(Boolean);
            if (topProds.length >= 3) secs.push({ key: "masvendidos", label: "⭐ Los más pedidos", items: topProds });
          }
          if (ofertas.length) secs.push({ key: "ofertas", label: "🔥 Ofertas", items: ofertas });
          // Cada categoría muestra TODOS sus productos (los que están en oferta/promo
          // aparecen tanto en "Ofertas" arriba como en su categoría correspondiente).
          cats.forEach((c) => secs.push({ key: c, label: emojiCat(c) + " " + c, items: visibles.filter((p) => p.cat === c) }));
          return secs;
        }
        return [{ key: "all", label: null, items: visibles }];
      }, [visibles, cat, soloOfertas, busqueda, cmpCat, masVendidos]);

      // Reiniciar la cantidad mostrada cuando cambian los filtros
      useEffect(() => { setLimite(12); }, [cat, busqueda, soloOfertas, orden, productos]);

      // Scroll infinito: cargar más al acercarse al final
      useEffect(() => {
        const node = sentinelRef.current;
        if (!node) return;
        const obs = new IntersectionObserver((e) => {
          if (e[0].isIntersecting) setLimite((l) => l + 12);
        }, { rootMargin: "500px" });
        obs.observe(node);
        return () => obs.disconnect();
      }, [secciones, limite]);

      // Tarjeta de producto reutilizable
      const renderCard = (p) => {
        const enCarrito = carrito[p.id] || 0;
        return (
          <div key={p.id} data-prod className="rounded-2xl overflow-hidden flex flex-col transition hover:-translate-y-0.5 h-full w-full" style={{ background: TEMA.bgCard, border: `1px solid ${enCarrito > 0 ? TEMA.gold : TEMA.borde}`, boxShadow: enCarrito > 0 ? `0 0 0 1px ${TEMA.gold}` : "none" }}>
            <div data-thumb onClick={() => setDetalle(p)} className="relative h-28 flex items-center justify-center cursor-pointer" style={{ background: TEMA.bgSoft }}>
              {p.foto ? <img src={p.foto} alt={p.nombre} className="w-full h-full object-contain p-1" loading="lazy" /> : <span className="text-5xl">{emojiCat(p.cat)}</span>}
              {p._esFamilia && <span className="absolute top-2 right-2 text-[10px] font-extrabold px-2 py-0.5 rounded-full" style={{ background: TEMA.gold, color: TEMA.bg, boxShadow: "0 2px 8px #00000055" }}>🗂️ {p._nVariantes}</span>}
              {p.enOferta && <span className="absolute top-2 left-2 text-[11px] font-extrabold px-2.5 py-1 rounded-full flex items-center gap-1" style={{ background: TEMA.oferta, color: "#fff", boxShadow: "0 2px 8px #00000055" }}>🔥 OFERTA{p.precioAntes && p.precioAntes > 0 ? ` −${Math.round((1 - p.precio / p.precioAntes) * 100)}%` : ""}</span>}
              {!p.enOferta && p.promo && <span className="absolute top-2 left-2 text-[11px] font-extrabold px-2.5 py-1 rounded-full flex items-center gap-1" style={{ background: TEMA.oferta, color: "#fff", boxShadow: "0 2px 8px #00000055" }}>🏷️ PROMO</span>}
              {enCarrito > 0 && <span className="absolute top-2 right-2 text-[11px] font-extrabold w-6 h-6 rounded-full flex items-center justify-center" style={{ background: TEMA.gold, color: TEMA.bg, boxShadow: "0 2px 8px #00000055" }}>{enCarrito}</span>}
            </div>
            <div className="p-3 flex flex-col flex-1">
              <h3 onClick={() => setDetalle(p)} className="text-sm font-medium leading-snug mb-1 line-clamp-2 cursor-pointer" style={{ minHeight: "2.5em" }}>{p.nombre}</h3>
              <div>
                {p.enOferta && p.precioAntes
                  ? (<div className="flex items-baseline gap-2">
                       <div className="precio-num text-lg font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif", color: TEMA.oferta }}>{fmt(p.precio)}</div>
                       <div className="precio-num text-xs line-through" style={{ color: TEMA.textoSuave }}>{fmt(p.precioAntes)}</div>
                     </div>)
                  : (<div className="precio-num text-lg font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif", color: TEMA.texto }}>{p._esFamilia ? "desde " : ""}{fmt(p.precio)}</div>)
                }
                {p.unidadesBulto > 1 && <div className="precio-num text-[11px]" style={{ color: TEMA.textoSuave }}>📦 caja x{p.unidadesBulto}: {fmt(p.precio * p.unidadesBulto)}</div>}
                {p.minCompra > 1 && <div className="text-[11px]" style={{ color: TEMA.textoSuave }}>mínimo {p.minCompra} u.</div>}
                {p.promo && <div className="precio-num text-[11px]" style={{ color: TEMA.ok }}>{fmt(p.promo.precio)} c/u{p.promo.cant ? ` llevando ${p.promo.cant}+` : ""}</div>}
              </div>
              <div className="mt-auto pt-2">
              {p._esFamilia ? (
                <button onClick={() => setDetalle(p)} className="w-full py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}>🗂️ Elegir opciones ›</button>
              ) : enCarrito === 0 ? (
                p.unidadesBulto > 1 ? (
                  <button onClick={() => setDetalle(p)} className="w-full py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}>📦 Elegir opción</button>
                ) : (
                  <button onClick={(e) => agregarConVuelo(p, e)} className="w-full py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}><Plus size={16} /> Agregar</button>
                )
              ) : (
                <div className="w-full py-1 rounded-lg flex items-center justify-between" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }}>
                  <button onClick={() => quitar(p.id)} className="px-3 py-1"><Minus size={16} style={{ color: TEMA.gold }} /></button>
                  <input
                    type="text" inputMode="numeric" value={enCarrito}
                    onChange={(e) => setCantidad(p.id, e.target.value)}
                    onFocus={(e) => e.target.select()}
                    aria-label="Cantidad"
                    className="font-bold text-sm text-center bg-transparent outline-none w-12"
                    style={{ color: TEMA.texto }} />
                  <button onClick={(e) => agregarConVuelo(p, e)} className="px-3 py-1"><Plus size={16} style={{ color: TEMA.gold }} /></button>
                </div>
              )}
              </div>
            </div>
          </div>
        );
      };

      // Fila compacta (modo lista rápida para mayoristas): foto chica, nombre, precio y cantidad.
      const renderFila = (p) => {
        const enCarrito = carrito[p.id] || 0;
        return (
          <div key={p.id} data-prod className="flex items-center gap-3 rounded-xl px-2.5 py-2 transition" style={{ background: TEMA.bgCard, border: `1px solid ${enCarrito > 0 ? TEMA.gold : TEMA.borde}` }}>
            <div data-thumb onClick={() => setDetalle(p)} className="relative w-12 h-12 shrink-0 rounded-lg flex items-center justify-center cursor-pointer overflow-hidden" style={{ background: TEMA.bgSoft }}>
              {p.foto ? <img src={p.foto} alt={p.nombre} className="w-full h-full object-contain" loading="lazy" /> : <span className="text-2xl">{emojiCat(p.cat)}</span>}
              {(p.enOferta || p.promo) && <span className="absolute -top-0.5 -left-0.5 text-[8px] font-extrabold px-1 py-0.5 rounded-br-lg" style={{ background: TEMA.oferta, color: "#fff" }}>🔥</span>}
            </div>
            <div className="flex-1 min-w-0 cursor-pointer" onClick={() => setDetalle(p)}>
              <div className="text-sm font-medium leading-snug line-clamp-1">{p.nombre}</div>
              <div className="flex items-center gap-2">
                {p.enOferta && p.precioAntes
                  ? (<span className="flex items-baseline gap-1.5"><span style={{ fontFamily: "'DM Sans', sans-serif", color: TEMA.oferta }} className="text-sm font-extrabold">{fmt(p.precio)}</span><span className="text-[11px] line-through" style={{ color: TEMA.textoSuave }}>{fmt(p.precioAntes)}</span></span>)
                  : (<span style={{ fontFamily: "'DM Sans', sans-serif", color: TEMA.gold }} className="text-sm font-extrabold">{p._esFamilia ? "desde " : ""}{fmt(p.precio)}</span>)
                }
                {p.unidadesBulto > 1 && !p._esFamilia && <span className="text-[10px]" style={{ color: TEMA.textoSuave }}>caja x{p.unidadesBulto}</span>}
                {p._esFamilia && <span className="text-[10px]" style={{ color: TEMA.textoSuave }}>🗂️ {p._nVariantes} opciones</span>}
              </div>
            </div>
            {p._esFamilia ? (
              <button onClick={() => setDetalle(p)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold" style={{ background: TEMA.gold, color: TEMA.bg }}>🗂️ ›</button>
            ) : enCarrito === 0 ? (
              p.unidadesBulto > 1 ? (
                <button onClick={() => setDetalle(p)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold" style={{ background: TEMA.gold, color: TEMA.bg }}>📦</button>
              ) : (
                <button onClick={(e) => agregarConVuelo(p, e)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1" style={{ background: TEMA.gold, color: TEMA.bg }}><Plus size={14} /> Agregar</button>
              )
            ) : (
              <div className="shrink-0 flex items-center rounded-lg" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }}>
                <button onClick={() => quitar(p.id)} className="px-2 py-1.5"><Minus size={14} style={{ color: TEMA.gold }} /></button>
                <input type="text" inputMode="numeric" value={enCarrito} onChange={(e) => setCantidad(p.id, e.target.value)} onFocus={(e) => e.target.select()} aria-label="Cantidad" className="font-bold text-sm text-center bg-transparent outline-none w-9" style={{ color: TEMA.texto }} />
                <button onClick={(e) => agregarConVuelo(p, e)} className="px-2 py-1.5"><Plus size={14} style={{ color: TEMA.gold }} /></button>
              </div>
            )}
          </div>
        );
      };

      const prodById = (id) => productos.find((x) => String(x.id) === String(id));
      const modoDe = (id) => modos[id] || "unidad";
      const precioVentaDe = (p) => modoDe(p.id) === "caja" ? p.precio * (p.unidadesBulto || 1) : p.precio;
      const qtyInicialDe = (p) => modoDe(p.id) === "caja" ? 1 : Math.max(p.minCompra || 1, p.cantDefault || 1);
      const minDe = (p) => modoDe(p.id) === "caja" ? 1 : (p.minCompra || 1);
      const elegirModo = (p, modo) => {
        setModos((m) => ({ ...m, [p.id]: modo }));
        setCarrito((c) => {
          if (!c[p.id]) return c;
          const ini = modo === "caja" ? 1 : Math.max(p.minCompra || 1, p.cantDefault || 1);
          return { ...c, [p.id]: ini };
        });
      };

      const agregar = (id) => {
        const p = prodById(id);
        setCarrito((c) => {
          const actual = c[id] || 0;
          const nueva = actual === 0 ? (p ? qtyInicialDe(p) : 1) : actual + 1;
          return { ...c, [id]: nueva };
        });
        setBump((b) => b + 1);
      };
      const agregarConVuelo = (p, e) => {
        try {
          const card = e.currentTarget.closest("[data-prod]");
          const thumb = card ? card.querySelector("[data-thumb]") : null;
          const src = (thumb || e.currentTarget).getBoundingClientRect();
          const cart = cartRef.current ? cartRef.current.getBoundingClientRect() : null;
          if (cart) {
            const id = Date.now() + "_" + Math.random();
            const fly = {
              id,
              startX: src.left + src.width / 2, startY: src.top + src.height / 2,
              endX: cart.left + cart.width / 2, endY: cart.top + cart.height / 2,
              foto: p.foto, emoji: emojiCat(p.cat),
            };
            setFlyers((arr) => [...arr, fly]);
          }
        } catch (err) { /* si algo falla, igual agrega */ }
        agregar(p.id);
      };
      const quitar = (id) => {
        const p = prodById(id);
        setCarrito((c) => {
          const actual = c[id] || 0;
          const min = p ? minDe(p) : 1;
          const nueva = actual - 1;
          const cp = { ...c };
          if (nueva < min) delete cp[id]; else cp[id] = nueva;
          return cp;
        });
      };
      const eliminar = (id) => setCarrito((c) => { const cp = { ...c }; delete cp[id]; return cp; });
      // Setear la cantidad directo (input editable en la tarjeta/carrito).
      const setCantidad = (id, valor) => {
        const p = prodById(id);
        const min = p ? minDe(p) : 1;
        let n = parseInt(String(valor).replace(/[^0-9]/g, ""), 10);
        setCarrito((c) => {
          const cp = { ...c };
          if (!n || isNaN(n) || n < 1) { // vacío o 0 → sacar del carrito
            delete cp[id];
          } else {
            if (n < min) n = min; // respeta el mínimo del producto
            cp[id] = n;
          }
          return cp;
        });
      };
      const [vaciando, setVaciando] = useState(false);
      const vaciar = () => {
        if (vaciando) return;
        if (!Object.keys(carrito).length) return;
        setVaciando(true);
        // Esperar a que termine la animación antes de vaciar de verdad
        setTimeout(() => { setCarrito({}); setVaciando(false); }, 850);
      };

      const itemsCarrito = Object.entries(carrito).map(([id, qty]) => {
        const p = productos.find((x) => String(x.id) === String(id));
        if (!p) return null;
        const modo = modos[id] || "unidad";
        const mult = modo === "caja" ? (p.unidadesBulto || 1) : 1;
        const unidadesReales = qty * mult;
        // Precio unitario individual: normal (o de oferta), o promo si se alcanza la cantidad.
        // La oferta tiene prioridad sobre la promo: no se acumulan.
        let unitInd = p.precio;
        const aplicaPromo = !!(p.promo && p.promo.precio > 0 && !p.enOferta && (!p.promo.cant || unidadesReales >= p.promo.cant));
        if (aplicaPromo) unitInd = p.promo.precio;
        const precioVenta = unitInd * mult;
        return { ...p, qty, modo, precioVenta, precioUnitInd: unitInd, unidadesReales, aplicaPromo, subtotal: precioVenta * qty };
      }).filter(Boolean);
      const totalUnidades = itemsCarrito.reduce((a, i) => a + i.qty, 0);
      const totalPesos = itemsCarrito.reduce((a, i) => a + i.subtotal, 0);
      // ── Reglas de compra y envío ──
      const compraMinima = cfg.compraMinima || 0;
      const envioGratisDesde = cfg.envioGratisDesde || 0;
      const costoEnvio = cfg.costoEnvio || 0;
      const subtotal = totalPesos;                                  // productos
      const cumpleMinimo = compraMinima === 0 || subtotal >= compraMinima;
      const faltaMinimo = Math.max(0, compraMinima - subtotal);
      const envioGratis = envioGratisDesde > 0 && subtotal >= envioGratisDesde;
      const envio = (!envioGratis && costoEnvio > 0) ? costoEnvio : 0;
      // Descuento por cupón (si hay uno aplicado y válido)
      const descuentoCupon = cuponAplicado
        ? (cuponAplicado.tipo === "monto"
            ? Math.min(cuponAplicado.valor, subtotal)
            : Math.round(subtotal * (cuponAplicado.valor / 100) * 100) / 100)
        : 0;
      const totalFinal = Math.max(0, subtotal - descuentoCupon) + envio;

      // Barra de progreso "inteligente": prioriza mínimo, luego envío gratis
      let barColor, barLabel, barPct;
      if (!cumpleMinimo) {
        barColor = TEMA.oferta; barPct = Math.min(100, (subtotal / compraMinima) * 100);
        barLabel = `Compra mínima ${fmt(compraMinima)} · te faltan ${fmt(faltaMinimo)}`;
      } else if (envioGratisDesde > 0 && !envioGratis) {
        barColor = TEMA.gold; barPct = Math.min(100, (subtotal / envioGratisDesde) * 100);
        const f = fmt(envioGratisDesde - subtotal);
        barLabel = costoEnvio > 0 ? `Te faltan ${f} para envío gratis (o ${fmt(costoEnvio)} de envío)` : `Te faltan ${f} para el envío gratis`;
      } else {
        barColor = TEMA.ok; barPct = 100;
        barLabel = envioGratis ? "🎉 ¡Tenés envío gratis!" : (costoEnvio > 0 ? `Envío: ${fmt(costoEnvio)}` : "✓ Listo para comprar");
      }

      // Inserta el pedido en backup_pedidos (sección Backup Pedidos de tu app)
      const confirmarPedido = async () => {
        if (!empresa) return;
        if (!cliNom.trim()) { alert("Poné tu nombre o el de tu comercio para continuar."); return; }
        if (cliTel.replace(/[^0-9]/g, "").length < 8) { alert("Poné un teléfono válido (con código de área). Lo usamos para avisarte sobre tu pedido."); return; }
        if (!cliDir.trim()) { alert("Poné tu dirección para coordinar la entrega."); return; }
        if (!cumpleMinimo) { alert(`La compra mínima es ${fmt(compraMinima)}. Te faltan ${fmt(faltaMinimo)}.`); return; }
        setErrorEnvio("");
        setEnviando(true);
        try {
          const itemsBackup = itemsCarrito.map((i) => {
            const esCaja = i.modo === "caja";
            const unidades = i.unidadesReales;
            const nombre = esCaja ? `${i.nombre} (caja x${i.unidadesBulto})` : i.nombre;
            const etiqueta = i.aplicaPromo ? "PROMO" : (i.enOferta ? "OFERTA" : null);
            return { id: i.codigo || String(i.id), n: nombre, c: unidades, p: i.precioUnitInd, sub: unidades * i.precioUnitInd, dsc: null, et: etiqueta };
          });
          if (envio > 0) itemsBackup.push({ id: "ENVIO", n: "Envío", c: 1, p: envio, sub: envio, dsc: null });
          const obsParts = ["📱 Pedido por tienda online"];
          if (cliTel.trim()) obsParts.push("Tel: " + cliTel.trim());
          if (cliDir.trim()) obsParts.push(cliDir.trim());
          if (envio > 0) obsParts.push("Envío: " + fmt(envio));
          if (cuponAplicado && descuentoCupon > 0) obsParts.push("Cupón " + cuponAplicado.codigo + " (−" + fmt(descuentoCupon) + ")");
          // Generar código de seguimiento único (6 caracteres legibles)
          const genCode = () => {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sin caracteres confusos (O,0,I,1,L)
            let c = "";
            for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
            return c;
          };
          const codigo = genCode();
          const body = {
            empresa_id: empresa.id,
            fecha: new Date().toISOString(),
            cliente_nom: cliNom.trim().slice(0, 200),
            cliente_id: cliTel.replace(/[^0-9]/g, "").slice(0, 20),
            obs: obsParts.join(" · ").slice(0, 500),
            items: itemsBackup,
            total: totalFinal,
            total_con_iva: Math.round(totalFinal * 1.21 * 100) / 100,
            tipo: "pedido",
            usuario: "tienda",
            usuario_nom: "Tienda Online",
            estado: "recibido",
            track_code: codigo,
          };
          const r = await fetch(`${SB_URL}/rest/v1/backup_pedidos`, {
            method: "POST",
            headers: { ...SB_HDR, "Content-Type": "application/json", "Prefer": "return=representation" },
            body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error(await r.text());
          // Incrementar el contador de usos del cupón (si se usó uno)
          if (cuponAplicado && cuponAplicado.id) {
            try {
              await fetch(`${SB_URL}/rest/v1/cupones?id=eq.${cuponAplicado.id}`, {
                method: "PATCH",
                headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
                body: JSON.stringify({ usos: (cuponAplicado.usos || 0) + 1 }),
              });
            } catch (_) {}
          }
          // Guardar el código de seguimiento (para mostrarlo y para seguimiento automático)
          setTrackCode(codigo);
          // Guardar este pedido como "último pedido" (para poder repetirlo y seguirlo)
          try {
            const ult = { carrito: { ...carrito }, modos: { ...modos }, fecha: new Date().toISOString(), trackCode: codigo };
            localStorage.setItem("tienda_ultped_" + empresa.codigo, JSON.stringify(ult));
            setUltimoPedido(ult);
          } catch (_) {}
          setPaso("exito");
        } catch (e) {
          console.error("Pedido:", e.message);
          setErrorEnvio("No se pudo enviar el pedido. Revisá tu conexión e intentá de nuevo (tu carrito no se perdió).");
        } finally { setEnviando(false); }
      };

      // Cierra el carrito y resetea todo el flujo
      const cerrarCarrito = () => { setCarritoAbierto(false); setTimeout(() => setPaso("carrito"), 200); };

      // Validar y aplicar un cupón de descuento
      const aplicarCupon = async () => {
        const code = (cuponInput || "").trim().toUpperCase();
        setCuponError("");
        if (!code) { setCuponError("Ingresá un código"); return; }
        if (!empresa) return;
        setCuponCargando(true);
        try {
          const rows = await sbGet("cupones", `select=*&empresa_id=eq.${empresa.id}&codigo=eq.${encodeURIComponent(code)}&limit=1`);
          const c = rows && rows[0];
          if (!c) { setCuponError("Cupón inexistente"); setCuponCargando(false); return; }
          if (!c.activo) { setCuponError("Este cupón está desactivado"); setCuponCargando(false); return; }
          // Vencimiento
          if (c.vence) {
            const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
            if (new Date(c.vence + "T23:59:59") < hoy) { setCuponError("Este cupón venció"); setCuponCargando(false); return; }
          }
          // Usos disponibles
          if (c.max_usos != null && c.usos >= c.max_usos) { setCuponError("Este cupón ya no tiene usos disponibles"); setCuponCargando(false); return; }
          // Compra mínima
          const subt = itemsCarrito.reduce((a, i) => a + i.subtotal, 0);
          if (c.compra_minima > 0 && subt < c.compra_minima) {
            setCuponError(`Necesitás comprar al menos ${fmt(c.compra_minima)} para usar este cupón`);
            setCuponCargando(false); return;
          }
          setCuponAplicado(c);
          setCuponError("");
        } catch (e) {
          setCuponError("No se pudo validar el cupón. Revisá tu conexión.");
        } finally { setCuponCargando(false); }
      };
      const quitarCupon = () => { setCuponAplicado(null); setCuponInput(""); setCuponError(""); };
      // Consultar el estado de un pedido por su código de seguimiento
      const consultarSeguimiento = async (codigo) => {
        const code = (codigo || "").trim().toUpperCase();
        if (!code || !empresa) return;
        setSegCargando(true); setSegEstado(null);
        try {
          const rows = await sbGet("backup_pedidos", `select=estado,track_code,fecha,cliente_nom,total&empresa_id=eq.${empresa.id}&track_code=eq.${encodeURIComponent(code)}&limit=1`);
          if (rows && rows[0]) {
            setSegEstado({ ok: true, estado: rows[0].estado || "recibido", fecha: rows[0].fecha, total: rows[0].total, code });
          } else {
            setSegEstado({ ok: false });
          }
        } catch (e) {
          setSegEstado({ ok: false, error: true });
        } finally { setSegCargando(false); }
      };
      const nuevoPedido = () => { setCarrito({}); setCliNom(""); setCliTel(""); setCliDir(""); setPaso("carrito"); setCarritoAbierto(false); };
      // Repetir el último pedido: recarga el carrito con los productos que TODAVÍA existan en el catálogo.
      const repetirPedido = () => {
        if (!ultimoPedido || !ultimoPedido.carrito) return;
        const nuevoCarrito = {};
        const nuevosModos = {};
        let faltantes = 0;
        Object.entries(ultimoPedido.carrito).forEach(([id, qty]) => {
          const existe = productos.find((p) => String(p.id) === String(id));
          if (existe) {
            nuevoCarrito[id] = qty;
            if (ultimoPedido.modos && ultimoPedido.modos[id]) nuevosModos[id] = ultimoPedido.modos[id];
          } else { faltantes++; }
        });
        if (!Object.keys(nuevoCarrito).length) {
          alert("Los productos de tu último pedido ya no están disponibles.");
          return;
        }
        setCarrito(nuevoCarrito);
        setModos((m) => ({ ...m, ...nuevosModos }));
        setCarritoAbierto(true);
        if (faltantes > 0) {
          setTimeout(() => alert(`Agregamos tu pedido anterior. ${faltantes} producto(s) ya no están disponibles y no se incluyeron.`), 300);
        }
      };
      // Compartir la tienda (Web Share API nativo; si no, copia el link o abre WhatsApp).
      const compartirTienda = async () => {
        const url = window.location.href;
        const titulo = nombreTienda || "Tienda online";
        const texto = `Mirá el catálogo de ${titulo}: `;
        try {
          if (navigator.share) {
            await navigator.share({ title: titulo, text: texto, url });
            return;
          }
        } catch (e) { return; /* el usuario canceló */ }
        // Fallback: copiar al portapapeles
        try {
          await navigator.clipboard.writeText(url);
          alert("¡Link copiado! Ya lo podés pegar donde quieras.");
        } catch (e) {
          // Último recurso: abrir WhatsApp con el link
          window.open(`https://wa.me/?text=${encodeURIComponent(texto + url)}`, "_blank");
        }
      };
      const avisarWhatsApp = () => {
        const lineas = itemsCarrito.map((i) => `• ${i.qty}x ${i.nombre} — ${fmt(i.subtotal)}`).join("\n");
        const extra = envio > 0 ? `\nEnvío: ${fmt(envio)}` : "";
        const datos = `Cliente: ${cliNom}` + (cliTel ? `\nTel: ${cliTel}` : "") + (cliDir ? `\nDirección: ${cliDir}` : "");
        const msg = `🛒 *Nuevo pedido por la tienda*\n\n${datos}\n\n${lineas}${extra}\n\n*Total: ${fmt(totalFinal)}*`;
        const num = (cfg.whatsapp || "").replace(/[^0-9]/g, "");
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, "_blank");
      };

      /* ---- Admin ---- */
      const cfgParaEditar = () => {
        const clon = JSON.parse(JSON.stringify(cfg));
        const reales = categorias.filter((c) => c !== "todos");
        const ord = (clon.ordenCategorias || []).filter((c) => reales.includes(c));
        reales.forEach((c) => { if (!ord.includes(c)) ord.push(c); });
        clon.ordenCategorias = ord;
        return clon;
      };
      const abrirAdmin = () => {
        if (adminOk) { setEditCfg(cfgParaEditar()); setEditorOpen(true); return; }
        // Si la empresa no se cargó bien, no tiene sentido abrir el login (no se podría validar).
        if (!empresa || !empresa.codigo) {
          setAviso("No se pudo identificar la empresa. Revisá que el enlace incluya ?emp=TUCODIGO.");
          return;
        }
        setLoginOpen(true); setLoginErr("");
      };
      const hacerLogin = async () => {
        if (!empresa) { setLoginErr("No se cargó la empresa. Verificá el enlace de acceso."); return; }
        setLoginCargando(true); setLoginErr("");
        try {
          const res = await validarAdmin(empresa.id, loginUid.trim(), loginPass, empresa.codigo);
          if (res.ok) {
            setAdminOk(true); setLoginOpen(false); setLoginPass(""); setEditCfg(cfgParaEditar()); setEditorOpen(true);
          } else if (res.motivo === "empresa") {
            setLoginErr("No se pudo identificar la empresa. Revisá el enlace (debe incluir ?emp=TUCODIGO).");
          } else if (res.motivo === "red") {
            setLoginErr("No se pudo conectar con el servidor. Probá de nuevo en un momento.");
          } else {
            setLoginErr("Usuario o contraseña incorrectos.");
          }
        } catch (e) { setLoginErr("Error inesperado: " + e.message); }
        finally { setLoginCargando(false); }
      };
      const salirAdmin = () => { setAdminOk(false); setEditorOpen(false); };

      const setEF = (k, v) => setEditCfg((c) => ({ ...c, [k]: v }));
      const setBenef = (i, k, v) => setEditCfg((c) => { const b = [...c.beneficios]; b[i] = { ...b[i], [k]: v }; return { ...c, beneficios: b }; });
      const addBenef = () => setEditCfg((c) => ({ ...c, beneficios: [...c.beneficios, { icon: "star", t: "Nuevo beneficio", s: "Descripción" }] }));
      const delBenef = (i) => setEditCfg((c) => ({ ...c, beneficios: c.beneficios.filter((_, j) => j !== i) }));
      const setBan = (i, k, v) => setEditCfg((c) => { const b = [...c.banners]; b[i] = { ...b[i], [k]: v }; return { ...c, banners: b }; });
      const addBan = () => setEditCfg((c) => ({ ...c, banners: [...c.banners, { emoji: "✨", titulo: "Nuevo banner", subtitulo: "Subtítulo", cta: "Ver", accion: "ofertas" }] }));
      const delBan = (i) => setEditCfg((c) => ({ ...c, banners: c.banners.filter((_, j) => j !== i) }));
      const moverCat = (i, dir) => setEditCfg((c) => {
        const arr = [...(c.ordenCategorias || [])];
        const j = i + dir;
        if (j < 0 || j >= arr.length) return c;
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        return { ...c, ordenCategorias: arr };
      });

      const guardar = async () => {
        if (!empresa) return;
        setGuardando(true);
        try { await guardarConfig(empresa.id, editCfg); setCfg(editCfg); setEditorOpen(false); setSlide(0); alert("✅ Cambios guardados"); }
        catch (e) { alert("❌ No se pudo guardar: " + e.message); }
        finally { setGuardando(false); }
      };

      const inputCls = "w-full px-3 py-2 rounded-lg text-sm outline-none";
      const inputStyle = { background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}`, color: TEMA.texto };

      return (
        <div style={{ background: TEMA.bg, color: TEMA.texto, fontFamily: "'DM Sans', sans-serif" }} className="min-h-screen w-full">
          {/* SPLASH / PANTALLA DE CARGA */}
          {splashVisible && (
            <div className="fixed inset-0 z-[60] flex flex-col items-center justify-center transition-opacity duration-500"
              style={{ background: TEMA.bg, opacity: splashFade ? 0 : 1, pointerEvents: splashFade ? "none" : "auto" }}>
              <div className="soft-float flex items-center justify-center mb-5">
                {empresa?.logo ? (
                  <img key="logo" src={empresa.logo} alt="logo" className="splash-in w-24 h-24 rounded-2xl object-cover" style={{ boxShadow: "0 8px 40px #00000066" }} />
                ) : (
                  <div className="splash-in w-24 h-24 rounded-2xl flex items-center justify-center text-5xl" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>🛒</div>
                )}
              </div>
              {empresa?.nombre && (
                <div key={empresa.nombre} className="splash-in font-extrabold text-xl mb-1" style={{ fontFamily: "'Syne', sans-serif", color: TEMA.gold }}>{empresa.nombre}</div>
              )}
              <div className="text-xs mb-6" style={{ color: TEMA.textoSuave }}>{empresa ? "Abriendo la tienda…" : "Cargando…"}</div>
              {/* indicador minimalista */}
              <div className="h-1 w-36 rounded-full overflow-hidden" style={{ background: TEMA.bgSoft }}>
                <div className="bar-grow h-full rounded-full" style={{ background: TEMA.gold }} />
              </div>
            </div>
          )}

          {/* Globitos volando al carrito */}
          {flyers.map((f) => <Flyer key={f.id} f={f} onDone={() => setFlyers((arr) => arr.filter((x) => x.id !== f.id))} />)}

          {/* Botón volver arriba — en móvil va arriba del stack de barras (bottom-36), despejado */}
          {showTop && (
            <button onClick={scrollArriba} aria-label="Volver arriba" className="fixed bottom-36 md:bottom-5 right-4 z-30 p-3 rounded-full transition active:scale-90" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.gold, boxShadow: "0 6px 20px #00000066" }}>
              <ChevronRight size={20} style={{ transform: "rotate(-90deg)" }} />
            </button>
          )}

          {/* Botón flotante de WhatsApp para dudas (si la empresa tiene número configurado) */}
          {(cfg.whatsapp || "").replace(/[^0-9]/g, "").length >= 8 && !carritoAbierto && (
            <a
              href={`https://wa.me/${(cfg.whatsapp || "").replace(/[^0-9]/g, "")}?text=${encodeURIComponent("¡Hola! Tengo una consulta sobre " + (nombreTienda || "la tienda") + ".")}`}
              target="_blank" rel="noopener noreferrer"
              aria-label="Consultar por WhatsApp"
              className="fixed left-4 z-30 p-3 rounded-full transition active:scale-90 bottom-36 md:bottom-5"
              style={{ background: "#25D366", color: "#fff", boxShadow: "0 6px 20px #00000066" }}>
              <WhatsApp size={22} />
            </a>
          )}

          {/* Barra flotante con el total del carrito (solo cuando hay productos y el carrito está cerrado).
              En móvil va justo ENCIMA del buscador flotante; en desktop, abajo. */}
          {totalUnidades > 0 && !carritoAbierto && (
            <div className="fixed left-0 right-0 z-20 px-4 bottom-20 md:bottom-20">
              <button onClick={() => setCarritoAbierto(true)}
                className="max-w-md mx-auto w-full flex items-center justify-between gap-3 rounded-2xl px-4 py-3 transition active:scale-[.98]"
                style={{ background: TEMA.gold, color: TEMA.bg, boxShadow: "0 10px 30px #00000088" }}>
                <span className="flex items-center gap-2 font-bold">
                  <ShoppingCart size={18} />
                  {totalUnidades} {totalUnidades === 1 ? "producto" : "productos"}
                </span>
                <span className="flex items-center gap-2">
                  <span className="font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif" }}>{fmt(totalPesos)}</span>
                  <span className="text-sm font-bold opacity-80">Ver pedido ›</span>
                </span>
              </button>
            </div>
          )}

          {/* Buscador flotante (solo móvil) — acompaña el scroll */}
          <div className="fixed bottom-4 left-0 right-0 px-4 z-30 md:hidden">
            <div className="max-w-md mx-auto flex items-center rounded-full pl-1 pr-1 transition-all duration-300"
              style={{
                background: buscFocus ? "#23364f" : "#1c2c44",
                backdropFilter: "blur(10px)",
                WebkitBackdropFilter: "blur(10px)",
                border: `1.5px solid ${buscFocus ? TEMA.gold : TEMA.gold + "66"}`,
                boxShadow: buscFocus ? `0 12px 32px #000000bb, 0 0 0 3px ${TEMA.gold}22` : "0 10px 28px #000000aa",
              }}>
              <Search size={18} className="ml-3 shrink-0 transition-colors" style={{ color: buscFocus ? TEMA.gold : TEMA.goldSoft }} />
              <input
                value={busqueda}
                onChange={(e) => setBusqueda(e.target.value)}
                onFocus={() => setBuscFocus(true)}
                onBlur={() => setBuscFocus(false)}
                placeholder="Buscar productos…"
                aria-label="Buscar productos"
                className="w-full py-3 px-3 bg-transparent outline-none text-sm font-medium"
                style={{ color: TEMA.texto }}
              />
              {busqueda && (
                <button onClick={() => setBusqueda("")} aria-label="Limpiar búsqueda" className="mr-1.5 p-1.5 rounded-full shrink-0" style={{ background: TEMA.bgSoft }}>
                  <X size={15} style={{ color: TEMA.textoSuave }} />
                </button>
              )}
            </div>
          </div>

          {/* Detalle de producto */}
          {/* MODAL DE SEGUIMIENTO DE PEDIDO */}
          {verSeguimiento && (() => {
            const pasos = [
              { k: "recibido", t: "Recibido", emoji: "📥" },
              { k: "preparando", t: "Preparando", emoji: "📦" },
              { k: "enviado", t: "Enviado", emoji: "🚚" },
              { k: "entregado", t: "Entregado", emoji: "✅" },
            ];
            const idxActual = segEstado && segEstado.ok ? pasos.findIndex((p) => p.k === segEstado.estado) : -1;
            return (
              <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center" onClick={() => setVerSeguimiento(false)}>
                <div className="absolute inset-0" style={{ background: "#000000aa" }} />
                <div className="relative w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl overflow-hidden step-in" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, maxHeight: "92vh" }} onClick={(e) => e.stopPropagation()}>
                  <div className="flex items-center justify-between p-4" style={{ borderBottom: `1px solid ${TEMA.borde}` }}>
                    <div className="flex items-center gap-2"><Package size={20} style={{ color: TEMA.gold }} /><h2 style={{ fontFamily: "'Syne', sans-serif" }} className="font-extrabold text-lg">Seguir mi pedido</h2></div>
                    <button onClick={() => setVerSeguimiento(false)} aria-label="Cerrar" className="p-1.5 rounded-full" style={{ background: TEMA.bgSoft }}><X size={18} style={{ color: TEMA.textoSuave }} /></button>
                  </div>
                  <div className="p-4">
                    <div className="text-xs mb-2" style={{ color: TEMA.textoSuave }}>Ingresá tu código de seguimiento</div>
                    <div className="flex gap-2 mb-4">
                      <input value={segInput} onChange={(e) => setSegInput(e.target.value.toUpperCase())} onKeyDown={(e) => e.key === "Enter" && consultarSeguimiento(segInput)} placeholder="Ej: A7F3K2" maxLength={6} className="flex-1 rounded-lg px-3 py-2.5 text-sm font-bold tracking-widest outline-none" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}`, color: TEMA.texto }} />
                      <button onClick={() => consultarSeguimiento(segInput)} disabled={segCargando || segInput.length < 6} className="px-4 py-2.5 rounded-lg text-sm font-bold" style={{ background: TEMA.gold, color: TEMA.bg, opacity: (segCargando || segInput.length < 6) ? .5 : 1 }}>{segCargando ? "..." : "Buscar"}</button>
                    </div>

                    {segEstado && segEstado.ok && (
                      <div>
                        <div className="text-center mb-4">
                          <div className="text-xs" style={{ color: TEMA.textoSuave }}>Pedido <b style={{ color: TEMA.gold }}>{segEstado.code}</b></div>

                                  {v.foto ? <img src={v.foto} alt={v.nombre} className="w-full h-full object-contain" loading="lazy" /> : <span className="text-xl">{emojiCat(v.cat)}</span>}

                                <div className="flex-1 min-w-0">

                                    {fmt(v.precio)}{v.enOferta && v.precioAntes ? <span className="text-[10px] line-through ml-1 font-normal" style={{ color: TEMA.textoSuave }}>{fmt(v.precioAntes)}</span> : null}

                                ) : (
                                  <div className="shrink-0 flex items-center gap-1 rounded-lg px-1" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}` }}>
                                    <button onClick={() => quitar(v.id)} className="px-2 py-1.5"><Minus size={14} style={{ color: TEMA.gold }} /></button>
                                    <span className="text-xs font-bold w-5 text-center">{enCar}</span>
                                    <button onClick={(e) => agregarConVuelo(v, e)} className="px-2 py-1.5"><Plus size={14} style={{ color: TEMA.gold }} /></button>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                        <button onClick={() => setDetalle(null)} className="w-full mt-3 py-2.5 rounded-xl text-sm font-bold" style={{ background: TEMA.gold, color: TEMA.bg }}>✓ Listo</button>
                      </div>
                    ) : (<>
                    {tieneCaja ? (
                      <>

                          <button onClick={() => elegirModo(p, "unidad")} className="flex-1 rounded-xl p-2.5 text-center transition active:scale-95" style={{ background: modo === "unidad" ? TEMA.gold : TEMA.bgSoft, color: modo === "unidad" ? TEMA.bg : TEMA.texto, border: `1px solid ${modo === "unidad" ? TEMA.gold : TEMA.borde}` }}>
                            <div className="text-[11px] font-bold">Por unidad</div>
                            <div className="text-base font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif" }}>{fmt(p.precio)}</div>
                          </button>
                          <button onClick={() => elegirModo(p, "caja")} className="flex-1 rounded-xl p-2.5 text-center transition active:scale-95" style={{ background: modo === "caja" ? TEMA.gold : TEMA.bgSoft, color: modo === "caja" ? TEMA.bg : TEMA.texto, border: `1px solid ${modo === "caja" ? TEMA.gold : TEMA.borde}` }}>
                            <div className="text-[11px] font-bold">Caja x{p.unidadesBulto}</div>
                            <div className="text-base font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif" }}>{fmt(p.precio * p.unidadesBulto)}</div>

                        {modo === "caja"
                          ? <div className="text-[11px] mb-3" style={{ color: TEMA.textoSuave }}>Cada caja trae {p.unidadesBulto} unidades · {fmt(p.precio)} c/u</div>

                      </>
                    ) : (
                      <>
                        <div className="text-2xl font-extrabold" style={{ fontFamily: "'DM Sans', sans-serif", color: TEMA.gold }}>{fmt(p.precio)}</div>

                      </>

                    {p.promo && <div className="text-xs mb-3" style={{ color: TEMA.ok }}>Promo: {fmt(p.promo.precio)} c/u{p.promo.cant ? ` llevando ${p.promo.cant}+` : ""}</div>}

                    {enCarrito === 0 ? (
                      <button onClick={(e) => agregarConVuelo(p, e)} className="w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-1 transition active:scale-95" style={{ background: TEMA.gold, color: TEMA.bg }}><Plus size={16} /> Agregar {modo === "caja" ? "caja" : "al carrito"}</button>

                      <div className="w-full py-1.5 rounded-xl flex items-center justify-between" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }}>

                        <button onClick={(e) => agregarConVuelo(p, e)} aria-label="Agregar uno" className="px-5 py-1.5"><Plus size={18} style={{ color: TEMA.gold }} /></button>
                      </div>

                    </>)}

                    {/* Comprados juntos: productos que suelen pedirse con este */}
                    {!p._esFamilia && (() => {
                      const sugIds = compradosJuntos[String(p.id)] || compradosJuntos[String(p.codigo)] || [];
                      const sugProds = sugIds
                        .map((id) => productos.find((x) => String(x.id) === String(id) || String(x.codigo) === String(id)))
                        .filter(Boolean)
                        .slice(0, 6);
                      if (sugProds.length < 2) return null;
                      return (
                        <div className="mt-4 pt-3" style={{ borderTop: `1px solid ${TEMA.borde}` }}>

                          <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
                            {sugProds.map((sp) => (
                              <div key={sp.id} onClick={() => setDetalle(sp)} className="shrink-0 w-24 cursor-pointer rounded-xl overflow-hidden" style={{ background: TEMA.bgSoft, border: `1px solid ${TEMA.borde}` }}>
                                <div className="h-16 flex items-center justify-center" style={{ background: TEMA.bg }}>
                                  {sp.foto ? <img src={sp.foto} alt={sp.nombre} className="w-full h-full object-contain p-1" loading="lazy" /> : <span className="text-2xl">{emojiCat(sp.cat)}</span>}
                                </div>
                                <div className="p-1.5">
                                  <div className="text-[10px] leading-tight line-clamp-2 mb-0.5" style={{ color: TEMA.texto }}>{sp.nombre}</div>

                                </div>

                  <div style={{ fontFamily: "'Syne', sans-serif", color: TEMA.gold }} className="font-extrabold text-lg">{nombreTienda}</div>

                <Search size={18} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: TEMA.textoSuave }} />

                  className="w-full pl-10 pr-9 py-2 rounded-xl text-sm outline-none" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.texto }} />

              </button>

                <Package size={18} />
              </button>
              <button onClick={toggleTema} aria-label={esOscuro ? "Cambiar a modo claro" : "Cambiar a modo oscuro"} title={esOscuro ? "Modo claro" : "Modo oscuro"} className="shrink-0 p-2.5 rounded-xl transition active:scale-95" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.gold }}>
                {esOscuro ? <Sun size={18} /> : <Moon size={18} />}

              <button onClick={compartirTienda} aria-label="Compartir tienda" className="shrink-0 p-2.5 rounded-xl transition active:scale-95" style={{ background: TEMA.bgCard, border: `1px solid ${TEMA.borde}`, color: TEMA.gold }}>
                <Share2 size={18} />
              </button>

                <ShoppingCart size={20} />

              </button>

                  <button onClick={() => setSlide((s) => (s - 1 + cfg.banners.length) % cfg.banners.length)} className="absolute left-2 top-1/2 -translate-y-1/2 p-1.5 rounded-full" style={{ background: "#00000055" }}><ChevronLeft size={18} /></button>
                  <button onClick={() => setSlide((s) => (s + 1) % cfg.banners.length)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 rounded-full" style={{ background: "#00000055" }}><ChevronRight size={18} /></button>
                  <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5">
                    {cfg.banners.map((_, i) => <button key={i} onClick={() => setSlide(i)} className="h-1.5 rounded-full transition-all" style={{ width: i === slide ? 20 : 6, background: i === slide ? TEMA.gold : TEMA.textoSuave }} />)}
                  </div>

            )}

            {cfg.beneficios.length > 0 && (
              <section className="mt-4 grid gap-2" style={{ gridTemplateColumns: `repeat(${Math.min(cfg.beneficios.length, 3)}, minmax(0, 1fr))` }}>

            {ultimoPedido && Object.keys(carrito).length === 0 && (

              <section ref={catBarRef} className="mt-5 flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
